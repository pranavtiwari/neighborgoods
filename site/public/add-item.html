<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Share, Instead. - Add Item</title>
<script src="config.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script src="firebase-client.js"></script>
    <script>requireAuth();</script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>
    
    <!-- Leaflet.js Map Picker -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
    
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
  <link rel="stylesheet" href="/style.css">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
</head>
<body class="bg-surface text-on-surface font-body min-h-screen">
    
    <!-- Header -->
    <header class="bg-[#fbf9f6]/80 dark:bg-stone-900/80 backdrop-blur-xl docked full-width top-0 sticky z-50 shadow-[0_12px_40px_rgba(51,51,51,0.06)]">
        <div class="flex items-center px-4 py-4 max-w-2xl mx-auto">
            <button onclick="window.history.back()" class="material-symbols-outlined active:scale-90 transition-transform p-2">arrow_back</button>
            <h1 class="ml-2 font-bold text-xl tracking-tight text-primary">Add New Item</h1>
        </div>
    </header>

    <main class="pt-24 pb-32 px-6 max-w-2xl mx-auto">
        <div class="mb-6">
            <h2 class="text-2xl font-bold tracking-tight mb-2">What are you sharing?</h2>
            <p class="text-stone-500 text-sm">Help a neighbor out by adding to the community inventory.</p>
        </div>

        <form id="add-item-form" class="space-y-6">
            
            <!-- Image Upload -->
            <div>
                <label class="block text-sm font-bold mb-2">Item Photo</label>
                <div id="image-preview-container" class="hidden relative w-full aspect-square md:aspect-video rounded-xl overflow-hidden bg-stone-100 border-2 border-stone-200 shadow-sm mb-3 group cursor-pointer" onclick="document.getElementById('image-upload').click()">
                    <img id="image-preview" src="" class="w-full h-full object-cover">
                    <div class="absolute inset-0 bg-black/40 hidden group-hover:flex items-center justify-center transition-all">
                        <span class="material-symbols-outlined text-white text-3xl">edit</span>
                    </div>
                </div>

                <div id="upload-placeholder" class="w-full aspect-square md:aspect-video rounded-xl border-2 border-dashed border-stone-300 bg-stone-50 flex flex-col items-center justify-center cursor-pointer hover:bg-stone-100 transition-colors" onclick="document.getElementById('image-upload').click()">
                    <span class="material-symbols-outlined text-outline text-4xl mb-2">add_a_photo</span>
                    <span class="text-sm font-medium text-stone-800">Tap to upload photo</span>
                </div>
                <input type="file" id="image-upload" accept="image/*" class="hidden">
            </div>

            <!-- Item Name -->
            <div>
                <label class="block text-sm font-bold mb-2">Name</label>
                <input type="text" id="item-name" required placeholder="e.g. Lawn Aerator" class="w-full bg-surface-container rounded-xl border-none focus:ring-2 focus:ring-primary py-4 px-4 shadow-inner text-base">
            </div>

            <!-- Category Dropdown -->
            <div>
                <label class="block text-sm font-bold mb-2">Category</label>
                <div class="relative">
                    <select id="item-category" required class="w-full bg-surface-container rounded-xl border-none focus:ring-2 focus:ring-primary py-4 px-4 shadow-inner text-base appearance-none">
                        <option value="garden">Garden Tools</option>
                        <option value="kitchen">Kitchen Gear</option>
                        <option value="electronics/computers">Electronics / Computers</option>
                        <option value="books">Books</option>
                        <option value="skills">Experience / Skills</option>
                        <option value="outdoor">Outdoor Adventure</option>
                        <option value="other">Other</option>
                    </select>
                    <span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-stone-500">expand_more</span>
                </div>
            </div>
            
            <!-- Listing Type Selector -->
            <div>
                <label class="block text-sm font-bold mb-2">Listing Type</label>
                <div class="grid grid-cols-2 gap-4">
                    <label class="flex flex-col items-center justify-center p-4 rounded-xl border-2 border-primary/20 bg-primary/5 hover:bg-primary/10 cursor-pointer transition-all active:scale-[0.98]" id="type-free-label">
                        <input type="radio" name="listing-type" value="free" checked class="hidden">
                        <span class="material-symbols-outlined text-primary text-2xl mb-1" style="font-variation-settings: 'FILL' 1;">volunteer_activism</span>
                        <span class="text-sm font-bold text-on-surface">Free to Borrow</span>
                        <span class="text-[10px] text-stone-500 text-center mt-1">Shared with neighbors at no charge</span>
                    </label>
                    <label class="flex flex-col items-center justify-center p-4 rounded-xl border border-outline-variant/30 hover:bg-stone-50 cursor-pointer transition-all active:scale-[0.98]" id="type-rental-label">
                        <input type="radio" name="listing-type" value="rental" class="hidden">
                        <span class="material-symbols-outlined text-stone-500 text-2xl mb-1">payments</span>
                        <span class="text-sm font-bold text-on-surface">Rental</span>
                        <span class="text-[10px] text-stone-500 text-center mt-1">Price negotiated over messages</span>
                    </label>
                </div>
            </div>

            <!-- Pickup Location -->
            <div>
                <label class="block text-sm font-bold mb-2">Pickup Location</label>
                <div class="flex gap-2">
                    <div class="relative flex-1">
                        <input type="text" id="item-location" required placeholder="Select on map or fetch GPS..." class="w-full bg-surface-container rounded-xl border-none focus:ring-2 focus:ring-primary py-4 px-4 shadow-inner text-base">
                        <span id="loc-loading-spinner" class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-stone-500 animate-spin hidden">progress_activity</span>
                    </div>
                    <button type="button" id="gps-btn" class="w-14 h-14 shrink-0 bg-surface-container hover:bg-stone-200 dark:hover:bg-stone-800 flex items-center justify-center rounded-xl text-primary active:scale-95 transition-all shadow-sm">
                        <span class="material-symbols-outlined text-2xl">my_location</span>
                    </button>
                </div>
                <div id="map-container" class="mt-3 rounded-xl overflow-hidden border border-outline-variant/30 shadow-sm h-60 w-full hidden relative z-10"></div>
                <p id="location-hint" class="text-[10px] text-stone-500 mt-1">On desktop, you can click on the map or drag the marker to specify the exact pickup location.</p>
            </div>

            <!-- Description -->
            <div>
                <label class="block text-sm font-bold mb-2">Description</label>
                <textarea id="item-description" rows="3" placeholder="Condition, details, when it's available..." class="w-full bg-surface-container rounded-xl border-none focus:ring-2 focus:ring-primary py-4 px-4 shadow-inner text-base resize-none"></textarea>
            </div>

            <!-- Error Banner -->
            <div id="error-message" class="hidden bg-red-100 text-error p-4 rounded-xl text-sm font-medium"></div>

            <button type="submit" id="submit-btn" class="w-full bg-gradient-to-br from-primary to-primary-container text-white py-4 rounded-xl font-bold shadow-lg shadow-green-900/20 active:scale-95 transition-all mt-8 flex justify-center items-center gap-2">
                <span class="material-symbols-outlined text-xl">share</span>
                Share with Community
            </button>
        </form>
    </main>

    <script>
        const form = document.getElementById('add-item-form');
        const imageUpload = document.getElementById('image-upload');
        const uploadPlaceholder = document.getElementById('upload-placeholder');
        const previewContainer = document.getElementById('image-preview-container');
        const imagePreview = document.getElementById('image-preview');
        const btn = document.getElementById('submit-btn');
        const errorDiv = document.getElementById('error-message');

        let selectedFile = null;
        let cropper = null;

        const cropperModal = document.getElementById('cropper-modal');
        const cropperImage = document.getElementById('cropper-image');

        // Location variables
        let itemLatitude = null;
        let itemLongitude = null;
        let map = null;
        let marker = null;
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

        // Parse query params for edit mode
        const urlParams = new URLSearchParams(window.location.search);
        const itemId = urlParams.get('id');
        let currentItemImageUrl = null;

        // Image Preview and Cropping Logic
        imageUpload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const url = URL.createObjectURL(file);
                cropperImage.src = url;
                cropperModal.classList.remove('hidden');
                
                if (cropper) {
                    cropper.destroy();
                }
                
                cropper = new Cropper(cropperImage, {
                    aspectRatio: 4 / 3,
                    viewMode: 1,
                    dragMode: 'move',
                    autoCropArea: 0.9,
                    responsive: true,
                    checkOrientation: false
                });
            }
        });

        const closeCropperFunc = () => {
            cropperModal.classList.add('hidden');
            if (cropper) {
                cropper.destroy();
                cropper = null;
            }
            imageUpload.value = ''; // Reset file input
        };

        document.getElementById('close-cropper').addEventListener('click', closeCropperFunc);
        document.getElementById('cancel-crop').addEventListener('click', closeCropperFunc);

        document.getElementById('apply-crop').addEventListener('click', () => {
            if (cropper) {
                const canvas = cropper.getCroppedCanvas({
                    width: 800,
                    height: 600,
                    imageSmoothingEnabled: true,
                    imageSmoothingQuality: 'high'
                });
                
                canvas.toBlob((blob) => {
                    const originalName = imageUpload.files[0]?.name || 'photo.jpg';
                    const fileExt = originalName.split('.').pop();
                    selectedFile = new File([blob], `cropped-${Date.now()}.${fileExt}`, { type: 'image/jpeg' });
                    
                    imagePreview.src = canvas.toDataURL('image/jpeg', 0.9);
                    uploadPlaceholder.classList.add('hidden');
                    previewContainer.classList.remove('hidden');
                    
                    cropperModal.classList.add('hidden');
                    cropper.destroy();
                    cropper = null;
                }, 'image/jpeg', 0.9);
            }
        });

        // Listing Type Interactive Highlighting
        const typeFreeLabel = document.getElementById('type-free-label');
        const typeRentalLabel = document.getElementById('type-rental-label');
        const typeFreeRadio = typeFreeLabel.querySelector('input');
        const typeRentalRadio = typeRentalLabel.querySelector('input');

        function updateTypeSelection() {
            if (typeFreeRadio.checked) {
                typeFreeLabel.className = "flex flex-col items-center justify-center p-4 rounded-xl border-2 border-primary/20 bg-primary/5 hover:bg-primary/10 cursor-pointer transition-all active:scale-[0.98]";
                typeFreeLabel.querySelector('.material-symbols-outlined').style.fontVariationSettings = "'FILL' 1";
                typeFreeLabel.querySelector('.material-symbols-outlined').classList.add('text-primary');
                typeFreeLabel.querySelector('.material-symbols-outlined').classList.remove('text-stone-500');

                typeRentalLabel.className = "flex flex-col items-center justify-center p-4 rounded-xl border border-outline-variant/30 hover:bg-stone-50 cursor-pointer transition-all active:scale-[0.98]";
                typeRentalLabel.querySelector('.material-symbols-outlined').style.fontVariationSettings = "'FILL' 0";
                typeRentalLabel.querySelector('.material-symbols-outlined').classList.remove('text-primary');
                typeRentalLabel.querySelector('.material-symbols-outlined').classList.add('text-stone-500');
            } else {
                typeRentalLabel.className = "flex flex-col items-center justify-center p-4 rounded-xl border-2 border-primary/20 bg-primary/5 hover:bg-primary/10 cursor-pointer transition-all active:scale-[0.98]";
                typeRentalLabel.querySelector('.material-symbols-outlined').style.fontVariationSettings = "'FILL' 1";
                typeRentalLabel.querySelector('.material-symbols-outlined').classList.add('text-primary');
                typeRentalLabel.querySelector('.material-symbols-outlined').classList.remove('text-stone-500');

                typeFreeLabel.className = "flex flex-col items-center justify-center p-4 rounded-xl border border-outline-variant/30 hover:bg-stone-50 cursor-pointer transition-all active:scale-[0.98]";
                typeFreeLabel.querySelector('.material-symbols-outlined').style.fontVariationSettings = "'FILL' 0";
                typeFreeLabel.querySelector('.material-symbols-outlined').classList.remove('text-primary');
                typeFreeLabel.querySelector('.material-symbols-outlined').classList.add('text-stone-500');
            }
        }

        typeFreeLabel.addEventListener('click', () => {
            typeFreeRadio.checked = true;
            updateTypeSelection();
        });

        typeRentalLabel.addEventListener('click', () => {
            typeRentalRadio.checked = true;
            updateTypeSelection();
        });

        // --- Geolocation & Nominatim Map Logic ---
        async function reverseGeocode(lat, lng) {
            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&zoom=18&addressdetails=1`, {
                    headers: {
                        'Accept-Language': 'en-US,en;q=0.9',
                        'User-Agent': 'NeighborGoods/1.0'
                    }
                });
                if (response.ok) {
                    const data = await response.json();
                    return data.display_name || `${lat.toFixed(5)}, ${lng.toFixed(5)}`;
                }
            } catch (err) {
                console.error("Reverse geocoding error:", err);
            }
            return `${lat.toFixed(5)}, ${lng.toFixed(5)}`;
        }

        async function updateLocationFromCoords(lat, lng) {
            itemLatitude = lat;
            itemLongitude = lng;
            const spinner = document.getElementById('loc-loading-spinner');
            if (spinner) spinner.classList.remove('hidden');

            const address = await reverseGeocode(lat, lng);
            document.getElementById('item-location').value = address;

            if (spinner) spinner.classList.add('hidden');
        }

        function initMap(lat, lng) {
            if (isMobile) return;

            const mapContainer = document.getElementById('map-container');
            mapContainer.classList.remove('hidden');

            const centerLat = lat || 37.7749;
            const centerLng = lng || -122.4194;

            map = L.map('map-container').setView([centerLat, centerLng], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
            }).addTo(map);

            marker = L.marker([centerLat, centerLng], { draggable: true }).addTo(map);

            marker.on('dragend', async function(e) {
                const pos = marker.getLatLng();
                await updateLocationFromCoords(pos.lat, pos.lng);
            });

            map.on('click', async function(e) {
                marker.setLatLng(e.latlng);
                await updateLocationFromCoords(e.latlng.lat, e.latlng.lng);
            });
        }

        async function requestGPSLocation() {
            const spinner = document.getElementById('loc-loading-spinner');
            if (spinner) spinner.classList.remove('hidden');

            if (!navigator.geolocation) {
                alert("Geolocation is not supported by your browser.");
                if (spinner) spinner.classList.add('hidden');
                return;
            }

            navigator.geolocation.getCurrentPosition(async (position) => {
                const lat = position.coords.latitude;
                const lng = position.coords.longitude;
                await updateLocationFromCoords(lat, lng);

                if (map && marker) {
                    map.setView([lat, lng], 13);
                    marker.setLatLng([lat, lng]);
                }
                if (spinner) spinner.classList.add('hidden');
            }, (error) => {
                console.error("GPS fetching failed:", error);
                alert("Failed to grab GPS location: " + error.message);
                if (spinner) spinner.classList.add('hidden');
            }, {
                enableHighAccuracy: true,
                timeout: 10000,
                maximumAge: 0
            });
        }

        document.getElementById('gps-btn').addEventListener('click', requestGPSLocation);

        // --- Edit Mode & Page Initialization ---
        async function initPage() {
            if (!itemId) {
                // Creation Mode: auto-locate if phone GPS, else map default
                if (isMobile) {
                    await requestGPSLocation();
                } else {
                    if (navigator.geolocation) {
                        navigator.geolocation.getCurrentPosition(async (position) => {
                            const lat = position.coords.latitude;
                            const lng = position.coords.longitude;
                            initMap(lat, lng);
                            await updateLocationFromCoords(lat, lng);
                        }, () => {
                            initMap(37.7749, -122.4194);
                        });
                    } else {
                        initMap(37.7749, -122.4194);
                    }
                }
                return;
            }

            // Edit Mode UI Updates
            document.querySelector('h1').textContent = "Edit Listing";
            document.querySelector('main h2').textContent = "Edit listing details";
            document.querySelector('main p').textContent = "Update your item information and keep neighbors informed.";
            btn.innerHTML = `<span class="material-symbols-outlined text-xl">save</span> Save Changes`;

            try {
                const item = await window.db.getItem(itemId);
                if (!item) {
                    alert("Item details not found!");
                    window.location.href = 'profile.html';
                    return;
                }

                // Populate inputs
                document.getElementById('item-name').value = item.name || '';
                document.getElementById('item-category').value = item.category || 'other';
                document.getElementById('item-description').value = item.description || '';
                
                if (item.listing_type === 'rental') {
                    typeRentalRadio.checked = true;
                } else {
                    typeFreeRadio.checked = true;
                }
                updateTypeSelection();

                if (item.image_url) {
                    currentItemImageUrl = item.image_url;
                    imagePreview.src = item.image_url;
                    uploadPlaceholder.classList.add('hidden');
                    previewContainer.classList.remove('hidden');
                }

                document.getElementById('item-location').value = item.location || '';
                itemLatitude = item.latitude || null;
                itemLongitude = item.longitude || null;

                // Load map with coordinates if on desktop
                if (!isMobile) {
                    if (itemLatitude && itemLongitude) {
                        initMap(itemLatitude, itemLongitude);
                    } else {
                        initMap(37.7749, -122.4194);
                    }
                }
            } catch (err) {
                console.error("Error loading item for edit:", err);
                alert("Failed to load item for edit.");
            }
        }

        document.addEventListener('DOMContentLoaded', initPage);

        const showError = (msg) => {
            errorDiv.textContent = msg;
            errorDiv.classList.remove('hidden');
            btn.innerHTML = itemId 
                ? `<span class="material-symbols-outlined text-xl">save</span> Save Changes`
                : `<span class="material-symbols-outlined text-xl">share</span> Share with Community`;
            btn.classList.remove('opacity-70', 'cursor-not-allowed');
            btn.disabled = false;
        };

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorDiv.classList.add('hidden');
            
            btn.disabled = true;
            btn.classList.add('opacity-70', 'cursor-not-allowed');
            btn.innerHTML = `<span class="material-symbols-outlined animate-spin">progress_activity</span> Saving...`;

            try {
                const session = await requireAuth();
                if (!session) return;

                const name = document.getElementById('item-name').value;
                const category = document.getElementById('item-category').value;
                const description = document.getElementById('item-description').value;
                const itemLocation = document.getElementById('item-location').value;

                let imageUrl = currentItemImageUrl;

                // Upload image if a new file is cropped/selected
                if (selectedFile) {
                    const fileExt = selectedFile.name.split('.').pop();
                    const fileName = `${Math.random()}.${fileExt}`;
                    const filePath = `item-images/${session.user.uid}/${fileName}`;
                    imageUrl = await window.db.uploadFile(filePath, selectedFile);
                }

                const listingType = document.querySelector('input[name="listing-type"]:checked').value;
                const payload = {
                    name: name,
                    category: category,
                    description: description,
                    image_url: imageUrl,
                    listing_type: listingType,
                    location: itemLocation,
                    latitude: itemLatitude || null,
                    longitude: itemLongitude || null
                };

                if (itemId) {
                    await window.db.updateItem(itemId, payload);
                    window.location.href = 'profile.html';
                } else {
                    await window.db.addItem({
                        ...payload,
                        owner_id: session.user.uid,
                        status: 'available'
                    });
                    window.location.href = 'explore.html';
                }

            } catch (err) {
                console.error(err);
                showError(err.message || "Failed to save item listing.");
            }
        });
    </script>
    <!-- Cropper Modal -->
    <div id="cropper-modal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-[100] hidden flex-col items-center justify-center p-4">
        <div class="bg-surface dark:bg-stone-900 rounded-3xl w-full max-w-lg overflow-hidden shadow-2xl flex flex-col max-h-[90vh]">
            <div class="px-6 py-4 border-b border-outline-variant/15 flex justify-between items-center shrink-0">
                <h3 class="font-bold text-lg">Crop Item Photo</h3>
                <button type="button" id="close-cropper" class="material-symbols-outlined hover:bg-stone-200 dark:hover:bg-stone-800 p-2 rounded-full">close</button>
            </div>
            <div class="flex-1 p-6 overflow-hidden flex items-center justify-center bg-stone-950/20">
                <div class="max-w-full max-h-[50vh] overflow-hidden rounded-lg">
                    <img id="cropper-image" src="" class="max-w-full block">
                </div>
            </div>
            <div class="px-6 py-4 border-t border-outline-variant/15 flex gap-4 shrink-0">
                <button type="button" id="cancel-crop" class="flex-1 py-3 border border-outline/30 font-semibold rounded-xl active:scale-[0.98] transition-all">Cancel</button>
                <button type="button" id="apply-crop" class="flex-1 py-3 bg-primary text-on-primary font-semibold rounded-xl active:scale-[0.98] transition-all">Apply Crop</button>
            </div>
        </div>
    </div>
</body>
</html>

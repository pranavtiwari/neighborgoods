<!-- FAB (Suppressed on Explore Details, but relevant for Search/Create on Discovery) -->
<button onclick="window.location.href='add-item.html'" class="fixed bottom-24 right-6 w-14 h-14 bg-primary text-on-primary rounded-full shadow-[0_12px_40px_rgba(51,51,51,0.2)] flex items-center justify-center active:scale-95 transition-transform z-40">
<span class="material-symbols-outlined" data-icon="add">add</span>
</button>
<script>
    const searchInput = document.getElementById('search-input');
    const categoryChips = document.querySelectorAll('.category-chip');
    const grid = document.getElementById('items-grid');
    
    let currentSearch = '';
    let currentCategory = 'all';

    // Haversine distance calculator
    function calculateDistance(lat1, lon1, lat2, lon2) {
        if (lat1 === null || lon1 === null || lat2 === null || lon2 === null) return null;
        const R = 3958.8; // Radius of the Earth in miles
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = 
            Math.sin(dLat / 2) * Math.sin(dLat / 2) +
            Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * 
            Math.sin(dLon / 2) * Math.sin(dLon / 2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        return R * c; // distance in miles
    }

    function getCurrentPositionPromise() {
        return new Promise((resolve) => {
            if (!navigator.geolocation) {
                resolve(null);
                return;
            }
            navigator.geolocation.getCurrentPosition(
                (pos) => resolve({ lat: pos.coords.latitude, lng: pos.coords.longitude }),
                (err) => resolve(null),
                { timeout: 5000 }
            );
        });
    }

    async function fetchItems() {
        try {
            const userPos = await getCurrentPositionPromise() || { lat: 37.7749, lng: -122.4194 }; // SF default
            const items = await window.db.getItems();
                
            if (!items || items.length === 0) {
                grid.innerHTML = `
                    <div class="col-span-2 md:col-span-3 flex flex-col items-center justify-center py-12">
                        <span class="material-symbols-outlined text-outline text-4xl mb-4" data-icon="inbox">inbox</span>
                        <p class="text-on-surface-variant font-medium">No items found.</p>
                        <p class="text-sm text-outline mt-1">Be the first to share something!</p>
                    </div>
                `;
                return;
            }

            // Compute distance for each item
            items.forEach(item => {
                if (item.latitude !== undefined && item.longitude !== undefined && item.latitude !== null && item.longitude !== null) {
                    item.distanceVal = calculateDistance(userPos.lat, userPos.lng, item.latitude, item.longitude);
                    item.distanceStr = item.distanceVal.toFixed(1) + " mi";
                } else {
                    // Fallback mock distance if item has no coordinates
                    const mockDist = Math.random() * 5 + 0.1;
                    item.distanceVal = mockDist;
                    item.distanceStr = mockDist.toFixed(1) + " mi";
                }
            });

            // Populate Hot Near You carousel (sort by distance ascending, show top 5)
            const nearbyItems = [...items].sort((a, b) => a.distanceVal - b.distanceVal);
            const carousel = document.getElementById('hot-carousel');
            
            if (nearbyItems.length === 0) {
                carousel.innerHTML = `<div class="text-stone-500 py-6 px-6 font-medium">No nearby items available yet.</div>`;
            } else {
                carousel.innerHTML = nearbyItems.slice(0, 5).map(item => {
                    const isRental = item.listing_type === 'rental';
                    const badgeText = isRental ? 'Rental' : 'Free';
                    const badgeClass = isRental 
                        ? 'bg-amber-100 text-amber-800 dark:bg-amber-900/40 dark:text-amber-300' 
                        : 'bg-green-100 text-green-800 dark:bg-green-900/40 dark:text-green-300';

                    return `
                    <div onclick="window.location.href='item-details.html?id=${item.id}'" class="min-w-[280px] md:min-w-[360px] aspect-[4/3] rounded-xl relative overflow-hidden group cursor-pointer shadow-md shrink-0">
                        <img alt="${item.name}" class="absolute inset-0 w-full h-full object-cover group-hover:scale-105 transition-transform duration-700" src="${item.image_url || 'https://placehold.co/600x400?text=' + encodeURIComponent(item.name)}"/>
                        <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/20 to-transparent"></div>
                        <div class="absolute bottom-4 left-4 right-4">
                            <span class="${badgeClass} px-2.5 py-0.5 rounded-full text-[9px] font-black uppercase tracking-widest mb-2 inline-block shadow-sm">${badgeText}</span>
                            <h3 class="text-white text-xl font-bold mb-0.5 truncate">${item.name}</h3>
                            <p class="text-white/80 text-xs font-semibold">${item.distanceStr} away &bull; ${item.owner_name || 'Neighbor'}</p>
                        </div>
                    </div>`;
                }).join('');
            }

            // Generate HTML for each item in Recently Added
            grid.innerHTML = items.map((item, index) => {
                const distance = item.distanceStr;
                const ownerName = item.owner_name || 'Neighbor';
                
                // Skills have a distinct horizontal card style
                if (item.category === 'skills') {
                    return `
                    <div onclick="window.location.href='item-details.html?id=${item.id}'" class="item-card col-span-2 bg-surface-container-lowest rounded-xl p-6 shadow-[0_12px_40px_rgba(51,51,51,0.04)] flex gap-6 items-center cursor-pointer" data-name="${item.name}" data-category="skills">
                        <div class="w-24 h-24 shrink-0 rounded-lg overflow-hidden bg-primary-fixed">
                            <img alt="${item.name}" class="w-full h-full object-cover mix-blend-multiply opacity-80" src="${item.image_url || ''}" onerror="this.src='https://placehold.co/400x400?text=Skill'"/>
                        </div>
                        <div class="flex-1">
                            <span class="text-[10px] font-black text-primary uppercase tracking-widest mb-1 block">Neighbor Skill</span>
                            <h4 class="font-bold text-xl leading-tight mb-1">${item.name}</h4>
                            <p class="text-sm text-on-surface-variant mb-2">${item.description || 'Available to help.'} ${distance} away.</p>
                            <button onclick="event.stopPropagation(); window.location.href='chat.html?userId=${item.owner_id}&itemId=${item.id}'" class="text-primary font-bold text-sm flex items-center gap-1 group">
                                Message Neighbor
                                <span class="material-symbols-outlined text-sm group-hover:translate-x-1 transition-transform" data-icon="arrow_forward">arrow_forward</span>
                            </button>
                        </div>
                    </div>`;
                }
                
                // Regular items (garden, kitchen, etc.)
                // Make the first item span 2 cols on tablet for visual interest
                const isFeatured = index === 0 ? "col-span-1 sm:col-span-2 md:col-span-1" : "";
                const imgAspect = index === 0 ? "aspect-square" : "aspect-[3/4]";
                
                const isRental = item.listing_type === 'rental';
                const typeBadge = isRental 
                    ? `<span class="bg-amber-100 dark:bg-amber-900/40 text-amber-800 dark:text-amber-300 text-[9px] font-black uppercase tracking-widest px-2.5 py-1 rounded-md shadow-sm">Rental</span>`
                    : `<span class="bg-green-100 dark:bg-green-900/40 text-green-800 dark:text-green-300 text-[9px] font-black uppercase tracking-widest px-2.5 py-1 rounded-md shadow-sm">Free</span>`;

                return `
                <div onclick="window.location.href='item-details.html?id=${item.id}'" class="item-card ${isFeatured} bg-surface-container-low rounded-xl p-4 shadow-sm flex flex-col gap-4 cursor-pointer" data-name="${item.name}" data-category="${item.category}">
                    <div class="${imgAspect} rounded-lg overflow-hidden ${index === 0 ? 'bg-surface-container-low' : ''} relative">
                        <img alt="${item.name}" class="w-full h-full object-cover" src="${item.image_url || ''}" onerror="this.src='https://placehold.co/400x600?text=Item'"/>
                        <div class="absolute top-3 left-3">
                            ${typeBadge}
                        </div>
                    </div>
                    <div class="flex flex-col gap-1">
                        <div class="flex justify-between items-start">
                            <h4 class="font-bold ${index === 0 ? 'text-lg' : 'text-md'} leading-tight">${item.name}</h4>
                            <span class="text-[10px] font-bold text-outline uppercase tracking-wider">${distance}</span>
                        </div>
                        ${index === 0 
                            ? `<p class="text-sm text-on-surface-variant mb-4 line-clamp-2">${item.description}</p>
                               <div class="flex gap-2">
                                   <button onclick="event.stopPropagation(); window.location.href='item-details.html?id=${item.id}'" class="flex-1 py-3 bg-primary-container text-on-primary font-bold rounded-xl active:scale-95 transition-transform">View Details</button>
                                   <a href="chat.html?userId=${item.owner_id}&itemId=${item.id}" onclick="event.stopPropagation()" class="w-12 h-12 bg-surface-container-highest flex items-center justify-center rounded-xl text-on-surface active:scale-95 transition-transform">
                                       <span class="material-symbols-outlined" data-icon="chat_bubble">chat_bubble</span>
                                   </a>
                                </div>`
                            : `<div class="mt-2 flex items-center justify-between">
                                 <div class="flex items-center gap-2">
                                     <div class="w-6 h-6 rounded-full overflow-hidden bg-secondary-fixed flex items-center justify-center">
                                         <img src="${item.owner_avatar || 'https://placehold.co/100x100?text=A'}" class="w-full h-full object-cover">
                                     </div>
                                     <span class="text-xs text-on-surface-variant line-clamp-1">${ownerName}</span>
                                 </div>
                                 <a href="chat.html?userId=${item.owner_id}&itemId=${item.id}" onclick="event.stopPropagation()" class="text-primary active:scale-90 transition-transform">
                                     <span class="material-symbols-outlined text-xl bg-primary/10 rounded-full p-1.5" data-icon="chat_bubble">chat_bubble</span>
                                 </a>
                               </div>`
                        }
                    </div>
                </div>`;
            }).join('');
            
        } catch (err) {
            console.error("Error fetching items:", err);
            grid.innerHTML = `<div class="col-span-2 md:col-span-3 text-error font-medium text-center">Failed to load items.</div>`;
        }
    }

    function filterItems() {
        const currentCards = document.querySelectorAll('.item-card');
        currentCards.forEach(card => {
            const name = card.getAttribute('data-name').toLowerCase();
            const category = card.getAttribute('data-category');
            
            const matchesSearch = name.includes(currentSearch.toLowerCase());
            const matchesCategory = currentCategory === 'all' || category === currentCategory;

            if (matchesSearch && matchesCategory) {
                card.style.display = 'flex';
            } else {
                card.style.display = 'none';
            }
        });
    }

    searchInput.addEventListener('input', (e) => {
        currentSearch = e.target.value;
        filterItems();
    });

    categoryChips.forEach(chip => {
        chip.addEventListener('click', () => {
            categoryChips.forEach(c => {
                c.classList.remove('bg-primary-container', 'text-on-primary');
                c.classList.add('bg-surface-container-high', 'text-on-surface-variant');
            });
            chip.classList.remove('bg-surface-container-high', 'text-on-surface-variant');
            chip.classList.add('bg-primary-container', 'text-on-primary');

            currentCategory = chip.getAttribute('data-category');
            filterItems();
        });
    });

    async function updateHeaderAvatar(user) {
        if (user) {
            const profile = await window.db.getProfile(user.uid);
            const metaAvatar = user.photoURL;
            if (profile && profile.avatar_url) {
                document.getElementById('header-avatar').src = profile.avatar_url;
            } else if (metaAvatar) {
                document.getElementById('header-avatar').src = metaAvatar;
            } else {
                document.getElementById('header-avatar').src = `https://i.pravatar.cc/150?u=${user.uid}`;
            }
        }
    }

    document.addEventListener('pointerdown', (e) => {
        const dropdown = document.getElementById('profile-dropdown');
        if (dropdown && !dropdown.classList.contains('hidden') && !e.target.closest('#profile-dropdown') && !e.target.closest('[onclick*="profile-dropdown"]')) {
            setTimeout(() => dropdown.classList.add('hidden'), 150);
        }
    });

    function initExplorePage() {
        fetchItems();
        firebase.auth().onAuthStateChanged((user) => {
            if (user) {
                updateHeaderAvatar(user);
            }
        });
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initExplorePage);
    } else {
        initExplorePage();
    }
</script>

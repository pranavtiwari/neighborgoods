<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Share, Instead. - Chat</title>
<script src="config.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script src="firebase-client.js"></script>
    <script>requireAuth();</script>
    
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#0d631b",
                        "primary-container": "#2e7d32",
                        surface: "#fbf9f6",
                        "on-surface": "#1b1c1a",
                        "on-surface-variant": "#40493d",
                        "surface-container": "#efeeeb",
                        "surface-container-low": "#f5f3f0",
                        "surface-container-lowest": "#ffffff",
                    },
                    fontFamily: {
                        body: ["Lexend"],
                    }
                }
            }
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
  <link rel="stylesheet" href="/style.css">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
</head>
<body class="bg-surface font-body text-on-surface antialiased flex flex-col h-screen">

    <!-- Header -->
    <header class="bg-[#fbf9f6]/80 dark:bg-stone-900/80 backdrop-blur-xl docked full-width top-0 sticky z-50 shadow-[0_12px_40px_rgba(51,51,51,0.06)]">
        <div class="flex items-center justify-between px-6 py-4">
            <div class="flex items-center gap-4">
                <button onclick="window.history.back()" class="p-2 -ml-2 rounded-full hover:bg-stone-200 transition-colors">
                    <span class="material-symbols-outlined">arrow_back</span>
                </button>
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full overflow-hidden">
                        <img id="target-avatar" src="https://placehold.co/100x100?text=..." class="w-full h-full object-cover">
                    </div>
                    <div>
                        <h1 id="target-name" class="font-bold text-lg leading-tight">...</h1>
                        <span class="text-xs text-primary font-medium flex items-center gap-1">
                            <span class="w-1.5 h-1.5 rounded-full bg-primary animate-pulse"></span> Online
                        </span>
                    </div>
                </div>
            </div>
            <button class="p-2 rounded-full hover:bg-stone-200 transition-colors">
                <span class="material-symbols-outlined">info</span>
            </button>
        </div>
    </header>

    <!-- Context Card -->
    <div id="context-card" class="px-6 py-3 sticky top-[72px] z-40 bg-surface/80 backdrop-blur-sm hidden">
        <div class="bg-surface-container-lowest rounded-xl p-3 shadow-[0_4px_20px_rgba(51,51,51,0.04)] flex items-center gap-4">
            <div class="w-12 h-12 rounded-lg overflow-hidden flex-shrink-0">
                <img id="context-item-img" src="" class="w-full h-full object-cover">
            </div>
            <div class="flex-1">
                <h2 id="context-item-name" class="text-sm font-bold truncate">...</h2>
                <div class="flex items-center gap-2 mt-0.5">
                    <span class="text-[10px] uppercase font-black text-primary tracking-widest" id="context-item-category">...</span>
                </div>
            </div>
            <button class="bg-primary/5 text-primary px-3 py-1.5 rounded-lg text-xs font-bold shrink-0">View Item</button>
        </div>
    </div>

    <!-- Message List -->
    <main id="chat-messages" class="flex-1 overflow-y-auto px-6 py-8 space-y-6 flex flex-col hide-scrollbar">
        <div class="text-center text-sm font-medium text-stone-400 mt-10">Starting secure chat...</div>
    </main>

    <!-- Sticky Input -->
    <footer class="p-6 bg-surface border-t border-outline-variant/10 shrink-0">
        <form id="chat-form" class="max-w-xl mx-auto flex items-center gap-3">
            <button type="button" class="w-12 h-12 flex items-center justify-center rounded-full bg-stone-200/50 text-on-surface">
                <span class="material-symbols-outlined">add</span>
            </button>
            <div class="flex-1 relative">
                <input type="text" id="message-input" required autocomplete="off" placeholder="Type a message..." class="w-full bg-stone-200/50 border-none rounded-2xl px-5 py-3 focus:ring-0 focus:bg-stone-200/80 transition-colors">
            </div>
            <button type="submit" id="send-btn" class="w-12 h-12 flex items-center justify-center rounded-full bg-primary text-white shadow-lg active:scale-95 transition-transform">
                <span class="material-symbols-outlined">send</span>
            </button>
        </form>
    </footer>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const targetUserId = urlParams.get('userId');
        const contextItemId = urlParams.get('itemId');

        const chatMessages = document.getElementById('chat-messages');
        const messageInput = document.getElementById('message-input');
        const chatForm = document.getElementById('chat-form');
        
        let currentUser = null;
        let targetUser = null;

        async function initChat() {
            const session = await requireAuth();
            if (!session) return;
            currentUser = session.user;

            if (!targetUserId) {
                chatMessages.innerHTML = `<div class="text-center text-error mt-10 font-bold">Error: No target user specified.</div>`;
                return;
            }

            // Fetch Target User Info
            const profileData = await window.db.getProfile(targetUserId);
            
            if (profileData) {
                targetUser = profileData;
                document.getElementById('target-name').textContent = profileData.full_name || 'Anonymous User';
                if (profileData.avatar_url) document.getElementById('target-avatar').src = profileData.avatar_url;
            } else {
                document.getElementById('target-name').textContent = 'Unknown User';
            }

            // Context Item Logic
            if (contextItemId) {
                const itemData = await window.db.getItem(contextItemId);
                if (itemData) {
                    document.getElementById('context-card').classList.remove('hidden');
                    document.getElementById('context-item-name').textContent = itemData.name;
                    document.getElementById('context-item-category').textContent = itemData.category;
                    if (itemData.image_url) {
                        document.getElementById('context-item-img').src = itemData.image_url;
                    }
                }
            }

            // Clear loading placeholder
            chatMessages.innerHTML = '';
            chatMessages.innerHTML += `
            <div class="flex justify-center mt-2 mb-4">
                <span class="text-[10px] uppercase font-black text-on-surface-variant/40 tracking-[0.2em] bg-stone-100 px-4 py-1 rounded-full">Message History</span>
            </div>`;

            subscribeToMessages();
        }

        function appendMessage(msg) {
            const emptyState = document.getElementById('empty-state');
            if (emptyState) emptyState.remove();

            const isMine = msg.sender_id === currentUser.uid;
            
            // Format time cleanly
            const timeVal = msg.created_at ? new Date(msg.created_at) : new Date();
            const timeString = timeVal.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

            if (isMine) {
                chatMessages.innerHTML += `
                <div class="flex flex-col items-end max-w-[85%] self-end w-full mt-4">
                    <div class="bg-primary text-white p-4 rounded-2xl rounded-tr-none leading-relaxed shadow-sm block break-words">
                        ${msg.content}
                    </div>
                    <div class="flex items-center gap-1 mt-1.5 mr-1 text-right">
                        <span class="text-[10px] text-on-surface-variant opacity-50 uppercase tracking-widest font-bold">Sent</span>
                        <span class="text-[10px] text-on-surface-variant opacity-50">•</span>
                        <span class="text-[10px] text-on-surface-variant opacity-50">${timeString}</span>
                    </div>
                </div>`;
            } else {
                chatMessages.innerHTML += `
                <div class="flex gap-3 max-w-[85%] self-start mt-4 w-full">
                    <div class="w-8 h-8 rounded-full overflow-hidden flex-shrink-0 mt-1">
                        <img src="${targetUser?.avatar_url || 'https://placehold.co/100x100?text=U'}" class="w-full h-full object-cover">
                    </div>
                    <div>
                        <div class="bg-stone-200/50 text-on-surface p-4 rounded-2xl rounded-tl-none leading-relaxed break-words">
                            ${msg.content}
                        </div>
                        <span class="text-[10px] text-on-surface-variant mt-1.5 ml-1 block opacity-50">${timeString}</span>
                    </div>
                </div>`;
            }
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = messageInput.value.trim();
            if (!text) return;

            messageInput.value = '';
            
            try {
                await window.db.sendMessage(
                    currentUser.uid,
                    targetUserId,
                    contextItemId || null,
                    text
                );
            } catch (error) {
                console.error("Failed to send", error);
                alert("Message failed to send.");
            }
        });

        let renderedMessageIds = new Set();
        let unsubscribeMessages = null;

        function subscribeToMessages() {
            unsubscribeMessages = window.db.subscribeToChatMessages(currentUser.uid, targetUserId, (msg) => {
                if (renderedMessageIds.has(msg.id)) return;
                renderedMessageIds.add(msg.id);
                appendMessage(msg);
            });
        }

        document.addEventListener('DOMContentLoaded', initChat);
    </script>
</body>
</html>

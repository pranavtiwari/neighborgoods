<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="config.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script src="firebase-client.js"></script>
<script>requireAuth();</script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>


<style>
        body {
            font-family: 'Lexend', sans-serif;
            background-color: #fbf9f6;
            -webkit-font-smoothing: antialiased;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-effect {
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .custom-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .custom-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
    <link rel="stylesheet" href="/style.css">
</head>
<body class="text-on-surface min-h-screen pb-32">
<!-- TopAppBar -->
<header class="bg-[#fbf9f6]/80 dark:bg-stone-900/80 backdrop-blur-xl docked full-width top-0 sticky z-50 shadow-[0_12px_40px_rgba(51,51,51,0.06)]">
<div class="flex items-center gap-4">
<button class="md:hidden material-symbols-outlined text-stone-800 hover:bg-stone-200/50 transition-colors p-2 rounded-full active:scale-95 duration-200">menu</button>
<a href="index.html" class="text-xl font-bold text-primary tracking-tight">Share, Instead.</a>
</div>
<div class="hidden md:flex gap-8 items-center">
<a class="text-stone-800 font-medium hover:bg-stone-100 transition-colors px-2 py-1 rounded tracking-tight" href="index.html">Home</a>
<a class="text-stone-800 font-medium hover:bg-stone-100 transition-colors px-2 py-1 rounded tracking-tight" href="explore.html">Explore</a>
<a class="text-primary font-semibold border-b-2 border-primary pb-1 tracking-tight" href="circles.html">Circles</a>
<a class="text-stone-800 font-medium hover:bg-stone-100 transition-colors px-2 py-1 rounded tracking-tight" href="activity.html">Activity</a>
</div>
<div class="relative">
    <div onclick="document.getElementById('profile-dropdown').classList.toggle('hidden')" class="w-10 h-10 rounded-full bg-surface-container overflow-hidden active:scale-95 transition-transform duration-200 cursor-pointer border-2 border-primary/20">
        <img id="header-avatar" alt="User avatar" class="w-full h-full object-cover" src="https://i.pravatar.cc/150?u=me"/>
    </div>
    <div id="profile-dropdown" class="hidden absolute right-0 mt-2 w-48 bg-surface rounded-xl shadow-xl border border-outline-variant z-50 py-2">
        <a href="profile.html" class="flex items-center gap-3 px-4 py-2 hover:bg-surface-container-high transition-colors">
            <span class="material-symbols-outlined text-[20px]">person</span>
            <span class="text-sm font-medium">My Profile</span>
        </a>
        <button onclick="window.logout()" class="w-full flex items-center gap-3 px-4 py-2 hover:bg-error-container text-error transition-colors">
            <span class="material-symbols-outlined text-[20px]">logout</span>
            <span class="text-sm font-bold">Logout</span>
        </button>
    </div>
</div>
</header>
<main class="pt-24 px-6 max-w-4xl mx-auto">
<!-- Search Bar -->
<section class="mb-10">
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-stone-400">search</span>
<input id="circle-search" class="w-full h-14 pl-12 pr-6 bg-surface-container-low rounded-xl border-none focus:ring-0 focus:bg-surface-container-lowest transition-all duration-300 placeholder:text-stone-400 text-on-surface body-lg shadow-sm" placeholder="Find a local circle..." type="text"/>
<div class="absolute bottom-0 left-4 right-4 h-0.5 bg-primary scale-x-0 group-focus-within:scale-x-100 transition-transform duration-300 origin-left"></div>
</div>
</section>
<!-- My Circles Section -->
<section class="mb-12">
<div class="flex items-end justify-between mb-6">
<h2 class="text-2xl font-bold tracking-tight text-on-surface">My Circles</h2>
<button class="text-primary font-medium text-sm hover:underline">See all activity</button>
</div>
<div id="my-circles-list" class="space-y-6">
    <!-- Loading State -->
    <div class="text-center py-12 text-stone-400">Loading your circles...</div>
</div>
</section>
<!-- Suggested for You Section -->
<section class="mb-12 overflow-hidden">
<h2 class="text-2xl font-bold tracking-tight text-on-surface mb-6">Suggested for You</h2>
<div id="suggested-circles-list" class="flex gap-6 overflow-x-auto pb-8 custom-scrollbar snap-x">
    <!-- Items will be injected here -->
</div>
</section>
    <!-- Floating Action Button -->
    <button onclick="window.location.href='create-circle.html'" class="fixed bottom-24 right-6 w-14 h-14 bg-primary text-on-primary rounded-full shadow-lg flex items-center justify-center active:scale-95 transition-transform z-40">
        <span class="material-symbols-outlined">add</span>
    </button>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pb-6 pt-3 bg-[#fbf9f6]/80 backdrop-blur-xl z-50 rounded-t-3xl shadow-[0_-8px_30px_rgba(0,0,0,0.04)]">
<a class="flex flex-col items-center justify-center text-stone-500 px-5 py-2 hover:text-primary transition-all active:scale-90 duration-200" href="index.html">
<span class="material-symbols-outlined mb-1">home</span>
<span class="font-lexend text-[11px] font-medium uppercase tracking-wider">Home</span>
</a>
<a class="flex flex-col items-center justify-center text-stone-500 px-5 py-2 hover:text-primary transition-all active:scale-90 duration-200" href="explore.html">
<span class="material-symbols-outlined mb-1">explore</span>
<span class="font-lexend text-[11px] font-medium uppercase tracking-wider">Explore</span>
</a>
<a class="flex flex-col items-center justify-center bg-green-100/50 text-primary rounded-2xl px-5 py-2 transition-all active:scale-90 duration-200" href="#">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 1;">groups</span>
<span class="font-lexend text-[11px] font-medium uppercase tracking-wider">Circles</span>
</a>
<a class="flex flex-col items-center justify-center text-stone-500 px-5 py-2 hover:text-primary transition-all active:scale-90 duration-200" href="profile.html">
<span class="material-symbols-outlined mb-1">person</span>
<span class="font-lexend text-[11px] font-medium uppercase tracking-wider">Me</span>
</a>
</nav>

<script>
    let allMyCircles = [];
    let allSuggestions = [];

    async function loadCircles() {
        const session = await requireAuth();
        if (!session) return;

        try {
            // Load My Joined Circles
            const memberships = await window.db.getMyMemberships(session.user.uid);
            allMyCircles = [];
            for (const m of memberships) {
                const circle = await window.db.getCircle(m.circle_id);
                if (circle) {
                    allMyCircles.push({ circles: circle });
                }
            }

            // Load Suggestion Circles
            const circles = await window.db.getCircles();
            const myCircleIds = new Set(allMyCircles.map(m => m.circles.id));
            allSuggestions = circles.filter(c => !myCircleIds.has(c.id));

            renderCircles();
        } catch (err) {
            console.error("Error loading circles:", err);
        }
    }

    function renderCircles(filter = '') {
        const query = filter.toLowerCase();
        
        // Render My Circles
        const myCirclesList = document.getElementById('my-circles-list');
        const filteredMyCircles = allMyCircles.filter(m => 
            m.circles && (m.circles.name.toLowerCase().includes(query) || (m.circles.description && m.circles.description.toLowerCase().includes(query)))
        );

        if (filteredMyCircles.length === 0) {
            myCirclesList.innerHTML = `<div class="text-center py-12 text-stone-400">${query ? 'No circles match your search.' : "You haven't joined any circles yet. Discover some below!"}</div>`;
        } else {
            myCirclesList.innerHTML = filteredMyCircles.map(m => {
                const circle = m.circles;
                return `
                <div onclick="window.location.href='circle-detail.html?id=${circle.id}'" class="group relative bg-surface-container-lowest cursor-pointer rounded-xl p-6 transition-all duration-300 hover:shadow-[0_20px_50px_rgba(51,51,51,0.08)] flex flex-col md:flex-row gap-6 items-start">
                    <div class="w-full md:w-48 aspect-video rounded-lg overflow-hidden bg-surface-container">
                        <img alt="${circle.name}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" src="${circle.image_url || 'https://placehold.co/400x250?text=Circle'}"/>
                    </div>
                    <div class="flex-1">
                        <h3 class="text-lg font-bold text-on-surface mb-2 group-hover:text-primary transition-colors">${circle.name}</h3>
                        <p class="text-on-surface-variant text-sm line-clamp-2 mb-4">${circle.description || 'No description provided.'}</p>
                        <div class="flex items-center gap-4 text-xs text-outline">
                            <span class="flex items-center gap-1"><span class="material-symbols-outlined text-sm">groups</span> Members</span>
                        </div>
                    </div>
                </div>
                `;
            }).join('');
        }

        // Render Suggestions
        const suggestionsList = document.getElementById('suggestions-list');
        const filteredSuggestions = allSuggestions.filter(c => 
            c.name.toLowerCase().includes(query) || (c.description && c.description.toLowerCase().includes(query))
        );

        if (filteredSuggestions.length === 0) {
            suggestionsList.innerHTML = `<div class="text-center py-12 text-stone-400">${query ? 'No matching circles found.' : 'No new circles available.'}</div>`;
        } else {
            suggestionsList.innerHTML = filteredSuggestions.map(circle => `
            <div class="bg-surface-container-low rounded-xl p-6 flex flex-col justify-between h-full border border-outline-variant/10">
                <div class="mb-6">
                    <div class="aspect-video w-full rounded-lg overflow-hidden bg-surface-container mb-4">
                        <img alt="${circle.name}" class="w-full h-full object-cover" src="${circle.image_url || 'https://placehold.co/400x250?text=Circle'}"/>
                    </div>
                    <h3 class="text-lg font-bold text-on-surface mb-1">${circle.name}</h3>
                    <p class="text-stone-500 text-sm mb-6">Nearby Circle</p>
                    <button onclick="joinCircle('${circle.id}')" class="w-full py-3 bg-primary text-on-primary rounded-xl font-semibold text-sm active:scale-95 duration-200">Join Circle</button>
                </div>
            </div>
            `).join('');
        }
    }

    async function joinCircle(circleId) {
        const session = await requireAuth();
        if (!session) return;

        try {
            await window.db.joinCircle(circleId, session.user.uid);
            // Refresh
            loadCircles();
        } catch (err) {
            console.error("Error joining circle:", err);
            alert("Failed to join circle. " + err.message);
        }
    }

    async function updateHeaderAvatar(user) {
        if (user) {
            const profile = await window.db.getProfile(user.uid);
            const metaAvatar = user.photoURL;
            if (profile && profile.avatar_url) {
                document.getElementById('header-avatar').src = profile.avatar_url;
            } else if (metaAvatar) {
                document.getElementById('header-avatar').src = metaAvatar;
            } else {
                document.getElementById('header-avatar').src = `https://i.pravatar.cc/150?u=${user.uid}`;
            }
        }
    }

    window.addEventListener('click', (e) => {
        const dropdown = document.getElementById('profile-dropdown');
        if (dropdown && !e.target.closest('#profile-dropdown') && !e.target.closest('[onclick*="profile-dropdown"]')) {
            dropdown.classList.add('hidden');
        }
    });

    document.getElementById('circle-search').addEventListener('input', (e) => {
        renderCircles(e.target.value);
    });

    document.addEventListener('DOMContentLoaded', () => {
        firebase.auth().onAuthStateChanged((user) => {
            if (user) {
                updateHeaderAvatar(user);
            }
        });
        loadCircles();
    });
</script>
</body></html>

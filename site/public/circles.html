<main class="pt-24 px-6 max-w-4xl mx-auto">

<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-stone-400">search</span>

<div class="absolute bottom-0 left-4 right-4 h-0.5 bg-primary scale-x-0 group-focus-within:scale-x-100 transition-transform duration-300 origin-left"></div>

</section>
<!-- My Circles Section (hidden when searching) -->

</section>
    <!-- Floating Action Button -->

</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-2 pb-6 pt-3 bg-[#fbf9f6]/90 dark:bg-stone-900/90 backdrop-blur-xl z-50 rounded-t-3xl shadow-[0_-8px_30px_rgba(51,51,51,0.06)] md:hidden border-t border-outline-variant/10">
    <a class="flex flex-col items-center justify-center py-1.5 px-3 rounded-xl transition-all duration-200 active:scale-90 text-stone-500 hover:text-primary dark:text-stone-400 dark:hover:text-green-400" href="index.html">
        <span class="material-symbols-outlined mb-0.5">home</span>
        <span class="text-[10px] font-bold uppercase tracking-wider">Home</span>
    </a>
    <a class="flex flex-col items-center justify-center py-1.5 px-3 rounded-xl transition-all duration-200 active:scale-90 text-stone-500 hover:text-primary dark:text-stone-400 dark:hover:text-green-400" href="explore.html">
        <span class="material-symbols-outlined mb-0.5">explore</span>
        <span class="text-[10px] font-bold uppercase tracking-wider">Explore</span>
    </a>
    <a class="flex flex-col items-center justify-center py-1.5 px-3 rounded-xl transition-all duration-200 active:scale-90 text-primary dark:text-green-400 bg-primary/10 dark:bg-green-900/30" href="circles.html">
        <span class="material-symbols-outlined mb-0.5" style="font-variation-settings: 'FILL' 1;">groups</span>
        <span class="text-[10px] font-bold uppercase tracking-wider">Circles</span>
    </a>
    <a class="flex flex-col items-center justify-center py-1.5 px-3 rounded-xl transition-all duration-200 active:scale-90 text-stone-500 hover:text-primary dark:text-stone-400 dark:hover:text-green-400 relative" href="messages.html">
        <div class="relative">
            <span class="material-symbols-outlined mb-0.5">chat_bubble</span>
            <span class="unread-badge-el absolute -top-1 -right-1 bg-red-500 text-white text-[8px] font-bold rounded-full w-4 h-4 flex items-center justify-center hidden">0</span>
        </div>
        <span class="text-[10px] font-bold uppercase tracking-wider">Inbox</span>
    </a>
    <a class="flex flex-col items-center justify-center py-1.5 px-3 rounded-xl transition-all duration-200 active:scale-90 text-stone-500 hover:text-primary dark:text-stone-400 dark:hover:text-green-400" href="activity.html">
        <span class="material-symbols-outlined mb-0.5">notifications</span>
        <span class="text-[10px] font-bold uppercase tracking-wider">Activity</span>
    </a>
</nav>

<script>
    let allMyCircles = [];
    let allSuggestions = [];

    async function loadCircles() {
        const session = await requireAuth();
        if (!session) return;

        try {
            // Load My Joined Circles
            const memberships = await window.db.getMyMemberships(session.user.uid);
            allMyCircles = [];
            for (const m of memberships) {
                const circle = await window.db.getCircle(m.circle_id);
                if (circle) {
                    if (circle.allowed_categories === undefined) {
                        console.log(`Migrating joined circle ${circle.name} to have allowed_categories: []`);
                        await window.db.updateCircle(circle.id, { allowed_categories: [] });
                        circle.allowed_categories = [];
                    }
                    const countSnap = await firebase.firestore().collection('circle_members')
                        .where('circle_id', '==', circle.id).get();
                    circle.memberCount = countSnap.size;
                    allMyCircles.push({ circles: circle });
                }
            }

            // Load Suggestion Circles
            const circles = await window.db.getCircles();
            
            // Migrate suggestion circles if allowed_categories is missing
            for (const c of circles) {
                if (c.allowed_categories === undefined) {
                    console.log(`Migrating circle ${c.name} to have allowed_categories: []`);
                    await window.db.updateCircle(c.id, { allowed_categories: [] });
                    c.allowed_categories = [];
                }
            }

            // Migrate existing requests if circle_id is missing
            try {
                const requestsSnap = await firebase.firestore().collection('requests').get();
                for (const doc of requestsSnap.docs) {
                    const req = doc.data();
                    if (req.circle_id === undefined && req.item_id) {
                        const itemDoc = await firebase.firestore().collection('items').doc(req.item_id).get();
                        if (itemDoc.exists) {
                            const itemData = itemDoc.data();
                            await doc.ref.update({
                                circle_id: itemData.circle_id || null,
                                circle_ids: itemData.circle_ids || []
                            });
                        } else {
                            await doc.ref.update({
                                circle_id: null,
                                circle_ids: []
                            });
                        }
                    }
                }
            } catch (migrationErr) {
                console.error("Requests migration error:", migrationErr);
            }

            // Migrate existing messages if circle_id is missing
            try {
                const messagesSnap = await firebase.firestore().collection('messages').get();
                for (const doc of messagesSnap.docs) {
                    const msg = doc.data();
                    if (msg.circle_id === undefined && msg.item_id) {
                        const itemDoc = await firebase.firestore().collection('items').doc(msg.item_id).get();
                        if (itemDoc.exists) {
                            const itemData = itemDoc.data();
                            await doc.ref.update({
                                circle_id: itemData.circle_id || null,
                                circle_ids: itemData.circle_ids || []
                            });
                        } else {
                            await doc.ref.update({
                                circle_id: null,
                                circle_ids: []
                            });
                        }
                    } else if (msg.circle_id === undefined) {
                        await doc.ref.update({
                            circle_id: null,
                            circle_ids: []
                        });
                    }
                }
            } catch (migrationErr) {
                console.error("Messages migration error:", migrationErr);
            }

            const myCircleIds = new Set(allMyCircles.map(m => m.circles.id));
            
            allSuggestions = [];
            for (const c of circles) {
                if (!myCircleIds.has(c.id)) {
                    const countSnap = await firebase.firestore().collection('circle_members')
                        .where('circle_id', '==', c.id).get();
                    c.memberCount = countSnap.size;
                    allSuggestions.push(c);
                }
            }

            renderCircles();
        } catch (err) {
            console.error("Error loading circles:", err);
        }
    }

    function renderCircles(filter = '') {
        const query = filter.toLowerCase().trim();


        const myCirclesSection = document.getElementById('my-circles-section');
        const suggestedSection = document.getElementById('suggested-circles-section');
        const searchResultsSection = document.getElementById('search-results-section');

        if (query) {
            // SEARCH MODE: hide normal sections, show unified search results across ALL circles
            myCirclesSection.classList.add('hidden');
            suggestedSection.classList.add('hidden');
            searchResultsSection.classList.remove('hidden');

            // Combine joined + unjoined circles for full search
            const allCircles = [
                ...allMyCircles.map(m => ({ ...m.circles, isMember: true })),
                ...allSuggestions.map(c => ({ ...c, isMember: false }))
            ];

            const matched = allCircles.filter(c =>
                c.name.toLowerCase().includes(query) ||
                (c.description && c.description.toLowerCase().includes(query))
            );

            const heading = document.getElementById('search-results-heading');
            const subheading = document.getElementById('search-results-subheading');
            heading.textContent = matched.length > 0
                ? `${matched.length} circle${matched.length !== 1 ? 's' : ''} found`
                : 'No circles found';
            subheading.textContent = matched.length > 0
                ? `Showing all circles matching "${filter}"`
                : `Try a different search term`;

            const list = document.getElementById('search-results-list');
            if (matched.length === 0) {
                list.innerHTML = `<div class="col-span-2 text-center py-12 text-stone-400">No circles match "${filter}". <a href="create-circle.html" class="text-primary underline">Create one?</a></div>`;
            } else {
                list.innerHTML = matched.map(circle => {
                    const isPrivate = circle.is_private || false;
                    let actionBtn;
                    if (circle.isMember) {
                        actionBtn = `<button onclick="window.location.href='circle-detail.html?id=${circle.id}'" class="w-full py-3 bg-surface-container-high text-on-surface rounded-xl font-semibold text-sm active:scale-95 transition-transform duration-200 flex items-center justify-center gap-2"><span class="material-symbols-outlined text-base" style="font-variation-settings:'FILL' 1">check_circle</span>View Circle</button>`;
                    } else if (isPrivate) {
                        actionBtn = `<button onclick="requestJoinCircle('${circle.id}', this)" class="w-full py-3 bg-primary/10 border border-primary text-primary rounded-xl font-semibold text-sm active:scale-95 transition-transform duration-200 flex items-center justify-center gap-2"><span class="material-symbols-outlined text-base">lock</span>Request to Join</button>`;
                    } else {
                        actionBtn = `<button onclick="joinCircle('${circle.id}', this)" class="w-full py-3 bg-primary text-on-primary rounded-xl font-semibold text-sm active:scale-95 transition-transform duration-200">Join Circle</button>`;
                    }
                    return `
                    <div class="bg-surface-container-low rounded-xl overflow-hidden border border-outline-variant/10 hover:shadow-lg transition-shadow duration-300">
                        <div class="relative aspect-video w-full overflow-hidden bg-surface-container">
                            <img alt="${circle.name}" class="w-full h-full object-cover hover:scale-105 transition-transform duration-500" src="${circle.image_url || 'https://placehold.co/400x250?text=Circle'}"/>
                            ${isPrivate ? '<span class="absolute top-2 right-2 bg-black/50 text-white text-[10px] font-bold px-2 py-0.5 rounded-full flex items-center gap-1"><span class="material-symbols-outlined" style="font-size:12px">lock</span>Private</span>' : ''}
                        </div>
                        <div class="p-5">
                            <h3 class="text-lg font-bold text-on-surface mb-1">${circle.name}</h3>
                            <p class="text-stone-500 text-sm line-clamp-2 mb-4">${circle.description || 'A local neighbourhood circle.'}</p>
                            ${actionBtn}
                        </div>
                    </div>`;
                }).join('');
            }
        } else {
            // DEFAULT MODE: show My Circles + Suggested sections
            myCirclesSection.classList.remove('hidden');
            suggestedSection.classList.remove('hidden');
            searchResultsSection.classList.add('hidden');

            // Render My Circles
            const myCirclesList = document.getElementById('my-circles-list');
            if (allMyCircles.length === 0) {
                myCirclesList.innerHTML = `<div class="text-center py-12 text-stone-400">You haven't joined any circles yet. Discover some below!</div>`;
            } else {
                myCirclesList.innerHTML = allMyCircles.map(m => {
                    const circle = m.circles;
                    return `
                    <div onclick="window.location.href='circle-detail.html?id=${circle.id}'" class="group relative bg-surface-container-lowest cursor-pointer rounded-xl p-6 transition-all duration-300 hover:shadow-[0_20px_50px_rgba(51,51,51,0.08)] flex flex-col md:flex-row gap-6 items-start">
                        <div class="w-full md:w-48 aspect-video rounded-lg overflow-hidden bg-surface-container">
                            <img alt="${circle.name}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" src="${circle.image_url || 'https://placehold.co/400x250?text=Circle'}"/>
                        </div>
                        <div class="flex-1">
                            <h3 class="text-lg font-bold text-on-surface mb-2 group-hover:text-primary transition-colors">${circle.name}</h3>
                            <p class="text-on-surface-variant text-sm line-clamp-2 mb-4">${circle.description || 'No description provided.'}</p>
                            <div class="flex items-center gap-4 text-xs text-outline">
                                <span class="flex items-center gap-1"><span class="material-symbols-outlined text-sm">groups</span> ${circle.memberCount || 0} Member${(circle.memberCount || 0) !== 1 ? 's' : ''}</span>
                            </div>
                        </div>
                    </div>
                    `;
                }).join('');
            }

            // Render Suggestions
            const suggestionsList = document.getElementById('suggested-circles-list');
            if (allSuggestions.length === 0) {
                suggestionsList.innerHTML = `<div class="col-span-2 text-center py-12 text-stone-400">No new circles available. <a href="create-circle.html" class="text-primary underline">Create one!</a></div>`;
            } else {
                suggestionsList.innerHTML = allSuggestions.map(circle => {
                    const isPrivate = circle.is_private || false;
                    const btn = isPrivate
                        ? `<button onclick="requestJoinCircle('${circle.id}', this)" class="w-full py-3 bg-primary/10 border border-primary text-primary rounded-xl font-semibold text-sm active:scale-95 transition-transform duration-200 flex items-center justify-center gap-2"><span class="material-symbols-outlined text-base">lock</span>Request to Join</button>`
                        : `<button onclick="joinCircle('${circle.id}', this)" class="w-full py-3 bg-primary text-on-primary rounded-xl font-semibold text-sm active:scale-95 transition-transform duration-200">Join Circle</button>`;
                    return `
                    <div class="bg-surface-container-low rounded-xl overflow-hidden border border-outline-variant/10 hover:shadow-lg transition-shadow duration-300">
                        <div class="relative aspect-video w-full overflow-hidden bg-surface-container">
                            <img alt="${circle.name}" class="w-full h-full object-cover hover:scale-105 transition-transform duration-500" src="${circle.image_url || 'https://placehold.co/400x250?text=Circle'}"/>
                            ${isPrivate ? '<span class="absolute top-2 right-2 bg-black/50 text-white text-[10px] font-bold px-2 py-0.5 rounded-full flex items-center gap-1"><span class="material-symbols-outlined" style="font-size:12px">lock</span>Private</span>' : ''}
                        </div>
                        <div class="p-5">
                            <h3 class="text-lg font-bold text-on-surface mb-1">${circle.name}</h3>
                            <p class="text-stone-500 text-sm line-clamp-2 mb-4">${circle.description || 'A local neighbourhood circle.'}</p>
                            ${btn}
                        </div>
                    </div>`;
                }).join('');
            }
        }
    }

    async function joinCircle(circleId, btn) {
        const session = await requireAuth();
        if (!session) return;
        if (btn) { btn.disabled = true; btn.textContent = 'Joining...'; }

        try {
            await window.db.joinCircle(circleId, session.user.uid);
            // Clear search and refresh
            document.getElementById('circle-search').value = '';
            loadCircles();
        } catch (err) {
            console.error("Error joining circle:", err);
            if (btn) { btn.disabled = false; btn.textContent = 'Join Circle'; }
            alert("Failed to join circle. " + err.message);
        }
    }

    async function requestJoinCircle(circleId, btn) {
        const session = await requireAuth();
        if (!session) return;
        if (btn) { btn.disabled = true; btn.innerHTML = 'Sending request...'; }

        try {
            await window.db.requestToJoinCircle(circleId, session.user.uid);
            if (btn) {
                btn.disabled = true;
                btn.innerHTML = '<span class="material-symbols-outlined text-base">schedule</span> Request Sent';
                btn.className = btn.className.replace('bg-primary/10 border border-primary text-primary', 'bg-stone-100 text-stone-400 border border-stone-200');
            }
        } catch (err) {
            console.error("Error requesting to join circle:", err);
            if (btn) { btn.disabled = false; btn.innerHTML = '<span class="material-symbols-outlined text-base">lock</span> Request to Join'; }
            alert("Failed to send request. " + err.message);
        }
    }

    async function updateHeaderAvatar(user) {
        if (user) {
            const profile = await window.db.getProfile(user.uid);
            const metaAvatar = user.photoURL;
            if (profile && profile.avatar_url) {
                document.getElementById('header-avatar').src = profile.avatar_url;
            } else if (metaAvatar) {
                document.getElementById('header-avatar').src = metaAvatar;
            } else {
                document.getElementById('header-avatar').src = `https://i.pravatar.cc/150?u=${user.uid}`;
            }
        }
    }

    document.addEventListener('pointerdown', (e) => {
        const dropdown = document.getElementById('profile-dropdown');
        if (dropdown && !dropdown.classList.contains('hidden') && !e.target.closest('#profile-dropdown') && !e.target.closest('[onclick*="profile-dropdown"]')) {
            setTimeout(() => dropdown.classList.add('hidden'), 150);
        }
    });

    document.getElementById('circle-search').addEventListener('input', (e) => {
        renderCircles(e.target.value);
    });

    document.addEventListener('DOMContentLoaded', () => {
        firebase.auth().onAuthStateChanged((user) => {
            if (user) {
                updateHeaderAvatar(user);
            }
        });
        loadCircles();
    });
</script>

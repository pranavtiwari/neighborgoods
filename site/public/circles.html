<!-- Floating Action Button - Supressed on this view as per shell guidelines if prioritized context is needed, 
         but keeping the TopAppBar trailing 'add' for primary creation intent -->
<script>
    async function loadCircles() {
        const session = await requireAuth();
        if (!session) return;

        try {
            // 1. Fetch My Circles
            const { data: myMemberships, error: memError } = await window.supabaseClient
                .from('circle_members')
                .select('circle_id, circles(*)')
                .eq('profile_id', session.user.id);

            if (memError) throw memError;

            const myCirclesList = document.getElementById('my-circles-list');
            const myCircleIds = myMemberships.map(m => m.circle_id);

            if (myMemberships.length === 0) {
                myCirclesList.innerHTML = `<div class="text-center py-12 text-stone-400">You haven't joined any circles yet. Discover some below!</div>`;
            } else {
                myCirclesList.innerHTML = myMemberships.map(m => {
                    const circle = m.circles;
                    if (!circle) return '';
                    return `
                    <div onclick="window.location.href='circle-detail.html?id=${circle.id}'" class="group relative bg-surface-container-lowest cursor-pointer rounded-xl p-6 transition-all duration-300 hover:shadow-[0_20px_50px_rgba(51,51,51,0.08)] flex flex-col md:flex-row gap-6 items-start">
                        <div class="w-20 h-20 rounded-xl overflow-hidden flex-shrink-0">
                            <img class="w-full h-full object-cover" src="${circle.image_url || 'https://placehold.co/200x200?text=Circle'}" />
                        </div>
                        <div class="flex-grow">
                            <div class="flex justify-between items-start">
                                <div>
                                    <h3 class="text-xl font-semibold text-on-surface mb-1">${circle.name}</h3>
                                    <p class="text-stone-500 text-sm font-medium">Active Community</p>
                                </div>
                            </div>
                            <div class="mt-4 p-4 bg-surface-container rounded-lg border-l-4 border-primary">
                                <p class="text-stone-700 text-sm leading-relaxed">
                                    ${circle.description || 'Welcome to our neighborhood circle!'}
                                </p>
                            </div>
                        </div>
                    </div>
                    `;
                }).join('');
            }

            // 2. Fetch Suggested Circles
            const { data: allCircles, error: allCirclesError } = await window.supabaseClient
                .from('circles')
                .select('*')
                .limit(10);

            if (allCirclesError) throw allCirclesError;

            const suggestedCirclesList = document.getElementById('suggested-circles-list');
            const suggestions = allCircles.filter(c => !myCircleIds.includes(c.id));

            if (suggestions.length === 0) {
                suggestedCirclesList.innerHTML = `<div class="text-center py-12 text-stone-400 w-full">No new circles found nearby.</div>`;
            } else {
                suggestedCirclesList.innerHTML = suggestions.map(circle => `
                <div class="snap-start min-w-[280px] bg-surface-container-low rounded-2xl p-6 flex flex-col items-center text-center border border-transparent hover:border-outline-variant transition-colors">
                    <div class="w-16 h-16 bg-secondary-fixed rounded-full overflow-hidden mb-4">
                        <img src="${circle.image_url || 'https://placehold.co/200x200'}" class="w-full h-full object-cover" />
                    </div>
                    <h3 class="text-lg font-bold text-on-surface mb-1">${circle.name}</h3>
                    <p class="text-stone-500 text-sm mb-6">Nearby Circle</p>
                    <button onclick="joinCircle('${circle.id}')" class="w-full py-3 bg-primary text-on-primary rounded-xl font-semibold text-sm active:scale-95 duration-200">Join Circle</button>
                </div>
                `).join('');
            }

        } catch (err) {
            console.error("Error loading circles:", err);
        }
    }

    async function joinCircle(circleId) {
        const session = await requireAuth();
        if (!session) return;

        try {
            const { error } = await window.supabaseClient
                .from('circle_members')
                .insert({
                    circle_id: circleId,
                    profile_id: session.user.id,
                    role: 'member'
                });

            if (error) throw error;
            
            // Refresh
            loadCircles();
        } catch (err) {
            console.error("Error joining circle:", err);
            alert("Failed to join circle. " + err.message);
        }
    }

    // Update header avatar
    async function updateHeaderAvatar() {
        const { data: { user } } = await window.supabaseClient.auth.getUser();
        if (user) {
            const { data: profile } = await window.supabaseClient
                .from('profiles')
                .select('avatar_url')
                .eq('id', user.id)
                .single();
            
            if (profile && profile.avatar_url) {
                document.getElementById('header-avatar').src = profile.avatar_url;
            } else {
                document.getElementById('header-avatar').src = `https://i.pravatar.cc/150?u=${user.id}`;
            }
        }
    }

    // Close dropdown on outside click
    window.addEventListener('click', (e) => {
        const dropdown = document.getElementById('profile-dropdown');
        if (dropdown && !e.target.closest('#profile-dropdown') && !e.target.closest('[onclick*="profile-dropdown"]')) {
            dropdown.classList.add('hidden');
        }
    });

    document.addEventListener('DOMContentLoaded', () => {
        loadCircles();
        updateHeaderAvatar();
    });
</script>

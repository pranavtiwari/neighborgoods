<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="config.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script src="firebase-client.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

<style>
        body { font-family: 'Lexend', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
    <link rel="stylesheet" href="/style.css">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
</head>
<body class="bg-surface text-on-surface min-h-screen pb-32">
<!-- TopAppBar -->
<header class="bg-[#fbf9f6]/80 dark:bg-stone-900/80 backdrop-blur-xl docked full-width top-0 sticky z-50 shadow-[0_12px_40px_rgba(51,51,51,0.06)]">
<div class="flex items-center gap-4">
<button onclick="window.location.href='index.html'" class="hover:bg-stone-200/50 dark:hover:bg-stone-800/50 transition-colors active:scale-95 duration-200 p-2 rounded-full">
<span class="material-symbols-outlined text-primary dark:text-green-400">arrow_back</span>
</button>
<h1 class="font-lexend text-base font-semibold tracking-tight text-stone-500 dark:text-stone-200">Item Details</h1>
</div>
<div class="flex items-center">
<button class="hover:bg-stone-200/50 dark:hover:bg-stone-800/50 transition-colors active:scale-95 duration-200 p-2 rounded-full">
<span class="material-symbols-outlined text-stone-500 dark:text-stone-200">bookmark</span>
</button>
</div>
</header>
<main class="max-w-screen-xl mx-auto px-4 md:px-8">
<!-- Hero Section Asymmetric Layout -->
<div class="mt-4 grid grid-cols-1 md:grid-cols-5 gap-8">
<!-- Hero Image -->
<div class="md:col-span-3">
<div class="relative overflow-hidden rounded-xl shadow-lg aspect-[4/5] md:aspect-auto md:h-[600px]">
<img id="item-photo" class="w-full h-full object-cover" data-alt="Item photo" src=""/>
<div class="absolute top-4 left-4">
<span class="bg-secondary-fixed text-on-secondary-fixed px-3 py-1 rounded-full text-xs font-bold tracking-wider uppercase">Borrowing</span>
</div>
</div>
</div>
<!-- Content Panel -->
<div class="md:col-span-2 flex flex-col gap-8">
<div>
<h2 class="text-4xl font-bold tracking-tighter text-primary leading-tight mb-2">...</h2>
<p id="item-location" class="text-on-surface-variant flex items-center gap-2">
<span class="material-symbols-outlined text-sm">location_on</span>
                        ...
                    </p>
</div>
<!-- Owner Info Section -->
<div class="bg-surface-container-lowest p-6 rounded-xl shadow-[0_12px_40px_rgba(51,51,51,0.04)]">
<div class="flex items-center justify-between">
<div class="flex items-center gap-4">
<div class="w-14 h-14 rounded-full overflow-hidden border-2 border-primary/10 relative">
<img id="owner-avatar" class="w-full h-full object-cover absolute inset-0" alt="Owner avatar" src=""/>
</div>
<div>
<h3 id="owner-name" class="font-bold text-lg leading-none">...</h3>
<p id="owner-location" class="text-on-surface-variant text-sm mt-1">...</p>
</div>
</div>
<button id="message-button" class="px-5 py-2 border-2 border-primary/20 text-primary font-semibold rounded-lg hover:bg-primary/5 transition-all active:scale-[0.98]">
                            Message
                        </button>
</div>
</div>
<!-- Description -->
<div class="space-y-4">
<h4 class="text-xl font-bold tracking-tight text-on-surface border-b border-outline-variant/15 pb-2">Description</h4>
<p id="item-description" class="text-on-surface-variant leading-relaxed body-lg">
                        ...
                    </p>
</div>
<!-- Details List -->
<div class="grid grid-cols-1 gap-3">
<div class="flex items-center justify-between p-4 bg-surface-container rounded-lg">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary-container">star_rate</span>
<span class="text-sm font-medium">Condition</span>
</div>
<span id="item-condition" class="text-sm font-bold">...</span>
</div>
<div class="flex items-center justify-between p-4 bg-surface-container rounded-lg">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary-container">payments</span>
<span class="text-sm font-medium">Listing Type</span>
</div>
<span id="item-type" class="text-sm font-bold">...</span>
</div>
</div>

<!-- Rental Notice Banner -->
<div id="rental-notice" class="hidden bg-amber-50 dark:bg-amber-950/20 border border-amber-200/50 dark:border-amber-900/30 text-amber-800 dark:text-amber-300 p-4 rounded-xl flex items-start gap-3 mt-4">
    <span class="material-symbols-outlined shrink-0 text-xl">info</span>
    <p class="text-xs font-semibold leading-normal">
        <strong>Rental Listing:</strong> The borrowing price/terms for this item will be negotiated with the owner over messages.
    </p>
</div>
</div>
</div>
</main>
<!-- Footer / Bottom CTA -->
<footer class="fixed bottom-0 w-full rounded-t-2xl px-6 py-4 bg-stone-50/80 dark:bg-stone-900/80 backdrop-blur-xl border-t border-stone-200/30 dark:border-stone-700/30 shadow-[0_-8px_30px_rgb(0,0,0,0.04)] z-50">
<div class="flex items-center justify-between max-w-screen-xl mx-auto">
<div class="hidden md:block">
<p class="text-xs font-medium text-stone-800 dark:text-stone-200 uppercase tracking-widest">Available Now</p>
<p id="reserve-title" class="text-lg font-bold text-primary">Reserve Item</p>
</div>
    <button id="request-button" class="w-full md:w-auto bg-gradient-to-br from-green-800 to-green-600 text-white font-bold rounded-lg px-12 py-4 active:scale-[0.98] transform transition-all shadow-lg hover:opacity-90">
                Request to Borrow
            </button>
</div>
</footer>
<script>
    async function loadItemDetails() {
        const urlParams = new URLSearchParams(window.location.search);
        const itemId = urlParams.get('id');
        
        if (!itemId) {
            console.error("No item ID provided in URL");
            return;
        }

        try {
            const item = await window.db.getItem(itemId);

            if (!item) return;

            // Update DOM
            document.title = `${item.name} - Share, Instead.`;
            document.querySelector('h2.text-4xl').textContent = item.name;
            document.getElementById('item-photo').src = item.image_url || 'https://placehold.co/800x600?text=' + encodeURIComponent(item.name);
            document.getElementById('item-description').textContent = item.description || 'No description provided.';
            
            const distance = (Math.random() * 5 + 0.1).toFixed(1) + " mi";
            document.getElementById('item-location').innerHTML = `<span class="material-symbols-outlined text-sm">location_on</span> ${distance} away`;

            // Owner Info
            const owner = item.profiles;
            if (owner) {
                document.getElementById('owner-name').textContent = owner.full_name || 'Anonymous Neighbor';
                document.getElementById('owner-avatar').src = owner.avatar_url || 'https://i.pravatar.cc/150?u=' + owner.id;
                document.getElementById('owner-location').innerHTML = `<span class="material-symbols-outlined text-xs align-middle mr-1">location_on</span>${owner.location || 'Nearby Neighborhood'}`;
            }

            // Update condition
            const conditionEl = document.getElementById('item-condition');
            if (conditionEl) conditionEl.textContent = item.condition || 'Good';

            // Update listing type and notice
            const isRental = item.listing_type === 'rental';
            const itemTypeEl = document.getElementById('item-type');
            const rentalNoticeEl = document.getElementById('rental-notice');
            
            if (itemTypeEl) {
                itemTypeEl.textContent = isRental ? 'Rental' : 'Free to Borrow';
            }
            if (isRental && rentalNoticeEl) {
                rentalNoticeEl.classList.remove('hidden');
            }

            // Update Reserve Title
            const reserveTitleEl = document.getElementById('reserve-title');
            if (reserveTitleEl) reserveTitleEl.textContent = `Reserve ${item.name}`;

            // Update Buttons based on ownership
            firebase.auth().onAuthStateChanged((user) => {
                const borrowBtn = document.getElementById('request-button');
                const chatBtn = document.getElementById('message-button');
                const reserveTitleEl = document.getElementById('reserve-title');

                if (user && user.uid === item.owner_id) {
                    // Owner view
                    if (chatBtn) {
                        chatBtn.textContent = 'Delete Listing';
                        chatBtn.classList.remove('text-primary', 'border-primary/20', 'hover:bg-primary/5', 'hidden');
                        chatBtn.classList.add('text-red-500', 'border-red-200', 'hover:bg-red-50');
                        chatBtn.onclick = async () => {
                            if (confirm('Are you sure you want to delete this listing?')) {
                                chatBtn.textContent = 'Deleting...';
                                chatBtn.disabled = true;
                                try {
                                    await window.db.deleteItem(itemId);
                                    window.location.href = 'explore.html';
                                } catch (e) {
                                    alert('Error deleting item');
                                    chatBtn.textContent = 'Delete Listing';
                                    chatBtn.disabled = false;
                                }
                            }
                        };
                    }
                    if (borrowBtn) {
                        borrowBtn.textContent = "Edit Listing";
                        borrowBtn.className = "w-full md:w-auto bg-gradient-to-br from-primary to-primary-container text-white font-bold rounded-lg px-12 py-4 active:scale-[0.98] transform transition-all shadow-lg hover:opacity-90";
                        const editUrl = window.location.pathname.endsWith('.html') ? `add-item.html?id=${itemId}` : `add-item?id=${itemId}`;
                        borrowBtn.onclick = () => window.location.href = editUrl;
                    }
                    if (reserveTitleEl) {
                        reserveTitleEl.textContent = "Your Listing";
                    }
                } else {
                    // Borrower view
                    if (borrowBtn) {
                        borrowBtn.textContent = "Request to Borrow";
                        borrowBtn.className = "w-full md:w-auto bg-gradient-to-br from-green-800 to-green-600 text-white font-bold rounded-lg px-12 py-4 active:scale-[0.98] transform transition-all shadow-lg hover:opacity-90";
                        borrowBtn.onclick = () => window.location.href = `request-borrow.html?id=${itemId}`;
                    }
                    if (chatBtn) {
                        chatBtn.classList.remove('hidden');
                        chatBtn.onclick = () => window.location.href = `chat.html?userId=${item.owner_id}&itemId=${itemId}`;
                    }
                    if (reserveTitleEl) {
                        reserveTitleEl.textContent = `Reserve ${item.name}`;
                    }
                }
            });
            
        } catch (err) {
            console.error("Error loading item details:", err);
        }
    }

    document.addEventListener('DOMContentLoaded', loadItemDetails);
</script>
</body></html>

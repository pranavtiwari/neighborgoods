<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Share, Instead. - Edit Profile</title>
<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js"></script>
<script>requireAuth();</script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
    tailwind.config = {
        darkMode: "class",
        theme: {
            extend: {
                "colors": {
                    "inverse-on-surface": "#f2f0ed",
                    "background": "#fbf9f6",
                    "on-primary-fixed": "#002204",
                    "surface-container": "#efeeeb",
                    "surface-container-highest": "#e4e2df",
                    "on-tertiary": "#ffffff",
                    "surface-container-lowest": "#ffffff",
                    "secondary-fixed-dim": "#ffb870",
                    "on-secondary": "#ffffff",
                    "secondary": "#8b5000",
                    "primary-fixed": "#a3f69c",
                    "secondary-fixed": "#ffdcbe",
                    "on-tertiary-container": "#ffedf0",
                    "outline": "#707a6c",
                    "on-tertiary-fixed-variant": "#7f2448",
                    "on-primary-container": "#cbffc2",
                    "tertiary": "#923357",
                    "primary-fixed-dim": "#88d982",
                    "on-primary-fixed-variant": "#005312",
                    "surface": "#fbf9f6",
                    "on-tertiary-fixed": "#3f001c",
                    "tertiary-fixed-dim": "#ffb1c7",
                    "on-background": "#1b1c1a",
                    "on-error-container": "#93000a",
                    "on-secondary-fixed": "#2c1600",
                    "on-secondary-fixed-variant": "#693c00",
                    "inverse-primary": "#88d982",
                    "primary": "#0d631b",
                    "surface-dim": "#dbdad7",
                    "surface-tint": "#1b6d24",
                    "surface-container-high": "#eae8e5",
                    "on-surface": "#1b1c1a",
                    "on-primary": "#ffffff",
                    "error-container": "#ffdad6",
                    "surface-container-low": "#f5f3f0",
                    "outline-variant": "#bfcaba",
                    "primary-container": "#2e7d32",
                    "tertiary-container": "#b14b6f",
                    "surface-variant": "#e4e2df",
                    "on-error": "#ffffff",
                    "on-secondary-container": "#653900",
                    "on-surface-variant": "#40493d",
                    "error": "#ba1a1a",
                    "surface-bright": "#fbf9f6",
                    "inverse-surface": "#30312f",
                    "secondary-container": "#ff9800",
                    "tertiary-fixed": "#ffd9e2"
                },
                "borderRadius": {
                    "DEFAULT": "0.5rem",
                    "lg": "1rem",
                    "xl": "1.5rem",
                    "full": "9999px"
                },
                "fontFamily": {
                    "headline": ["Lexend"],
                    "display": ["Lexend"],
                    "body": ["Lexend"],
                    "label": ["Lexend"]
                }
            },
        },
    }
</script>
<style>
    .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    body {
        font-family: 'Lexend', sans-serif;
        background-color: #fbf9f6;
        min-height: max(884px, 100dvh);
    }
</style>
</head>
<body class="text-on-surface">

<!-- Header -->
<header class="bg-[#fbf9f6]/95 backdrop-blur-xl border-b border-outline-variant/10 sticky top-0 z-50">
    <div class="flex items-center justify-between px-6 py-4">
        <div class="flex items-center gap-4">
            <button onclick="window.history.back()" class="p-2 -ml-2 rounded-full hover:bg-stone-200 transition-colors">
                <span class="material-symbols-outlined">arrow_back</span>
            </button>
            <h1 class="text-xl font-bold tracking-tight">Edit Profile</h1>
        </div>
    </div>
</header>

<main class="py-8 px-6 max-w-2xl mx-auto space-y-8">
    <!-- Avatar Edit -->
    <section class="flex flex-col items-center justify-center space-y-4">
        <label for="avatar-upload" class="relative group cursor-pointer block">
            <img id="avatar-preview" alt="Profile Picture" class="w-28 h-28 rounded-full object-cover border-4 border-surface-container-lowest shadow-md group-hover:opacity-75 transition-opacity" src="https://placehold.co/400x400?text=Avatar"/>
            <div class="absolute inset-0 flex items-center justify-center bg-black/30 rounded-full opacity-0 group-hover:opacity-100 transition-opacity">
                <span class="material-symbols-outlined text-white text-3xl" style="font-variation-settings: 'FILL' 1;">photo_camera</span>
            </div>
        </label>
        <input type="file" id="avatar-upload" accept="image/*" class="hidden">
        <label for="avatar-upload" class="text-primary font-bold text-sm cursor-pointer hover:underline">Change Profile Photo</label>
    </section>

    <!-- Form Section -->
    <section class="bg-surface-container-low p-6 rounded-2xl shadow-sm border border-outline-variant/20">
        <form class="space-y-6" id="editProfileForm">
            
            <div class="space-y-2">
                <label for="fullName" class="block text-sm font-semibold text-on-surface-variant">Full Name</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <span class="material-symbols-outlined text-outline">person</span>
                    </div>
                    <input type="text" id="fullName" class="block w-full pl-10 pr-3 py-3 border border-outline-variant rounded-xl bg-surface-container-lowest focus:ring-primary focus:border-primary text-on-surface" placeholder="Your name">
                </div>
            </div>

            <div class="space-y-2">
                <label for="location" class="block text-sm font-semibold text-on-surface-variant">Location (Neighborhood)</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <span class="material-symbols-outlined text-outline">location_on</span>
                    </div>
                    <input type="text" id="location" class="block w-full pl-10 pr-3 py-3 border border-outline-variant rounded-xl bg-surface-container-lowest focus:ring-primary focus:border-primary text-on-surface" placeholder="E.g., Northside">
                </div>
            </div>

            <div class="space-y-2">
                <label for="bio" class="block text-sm font-semibold text-on-surface-variant">Bio</label>
                <textarea id="bio" rows="4" class="block w-full p-3 border border-outline-variant rounded-xl bg-surface-container-lowest focus:ring-primary focus:border-primary text-on-surface" placeholder="Tell your neighbors a bit about yourself!"></textarea>
                <p class="text-xs text-outline font-medium mt-1">Keep it brief and friendly.</p>
            </div>

            <div id="error-message" class="hidden bg-red-100 text-error p-4 rounded-xl text-sm font-medium mt-4"></div>

        </form>
    </section>
</main>

<!-- Bottom Sticky Action -->
<div class="fixed bottom-0 left-0 w-full p-4 bg-background/95 backdrop-blur-md border-t border-outline-variant/10">
    <button id="saveBtn" class="w-full max-w-2xl mx-auto block bg-gradient-to-br from-primary to-primary-container text-on-primary py-4 rounded-xl font-bold text-center shadow-md active:scale-95 transition-transform">
        Save Changes
    </button>
</div>

<script>
    const avatarUpload = document.getElementById('avatar-upload');
    const avatarPreview = document.getElementById('avatar-preview');
    let selectedFile = null;

    // Image Preview
    avatarUpload.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
            selectedFile = file;
            avatarPreview.src = URL.createObjectURL(file);
        }
    });

    // Hydrate Data on Load
    document.addEventListener('DOMContentLoaded', async () => {
        const session = await requireAuth();
        if (!session) return;
        
        const { data } = await window.supabaseClient
            .from('profiles')
            .select('*')
            .eq('id', session.user.id)
            .single();

        if (data) {
            if (data.full_name) document.getElementById('fullName').value = data.full_name;
            if (data.location) document.getElementById('location').value = data.location;
            if (data.bio) document.getElementById('bio').value = data.bio;
            if (data.avatar_url) avatarPreview.src = data.avatar_url;
        }
    });

    document.getElementById('saveBtn').addEventListener('click', async () => {
        const btn = document.getElementById('saveBtn');
        const errorDiv = document.getElementById('error-message');
        errorDiv.classList.add('hidden');
        
        btn.innerHTML = `<span class="material-symbols-outlined animate-spin align-middle mr-2">progress_activity</span> Saving...`;
        btn.disabled = true;
        btn.classList.add('opacity-70');

        try {
            const session = await requireAuth();
            
            const fullName = document.getElementById('fullName').value;
            const location = document.getElementById('location').value;
            const bio = document.getElementById('bio').value;
            let avatarUrl = undefined; // Undefined means we don't update it if unchanged

            if (selectedFile) {
                const fileExt = selectedFile.name.split('.').pop();
                const fileName = `${Math.random()}.${fileExt}`;
                const filePath = `${session.user.id}/${fileName}`;

                const { error: uploadError } = await window.supabaseClient.storage
                    .from('avatars')
                    .upload(filePath, selectedFile, { upsert: true });
                if (uploadError) throw uploadError;

                const { data: urlData } = window.supabaseClient.storage
                    .from('avatars')
                    .getPublicUrl(filePath);
                avatarUrl = urlData.publicUrl;
            }

            const updates = {
                full_name: fullName,
                location: location,
                bio: bio,
            };
            if (avatarUrl) updates.avatar_url = avatarUrl;

            const { error: updateError } = await window.supabaseClient
                .from('profiles')
                .update(updates)
                .eq('id', session.user.id);

            if (updateError) throw updateError;
            
            window.location.href = 'profile.html';
        } catch (err) {
            console.error(err);
            errorDiv.textContent = err.message || "Failed to update profile.";
            errorDiv.classList.remove('hidden');
            btn.innerHTML = "Save Changes";
            btn.disabled = false;
            btn.classList.remove('opacity-70');
        }
    });
</script>

</body>
</html>

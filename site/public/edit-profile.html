<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Share, Instead. - Edit Profile</title>
<script src="config.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script src="firebase-client.js"></script>
<script>requireAuth();</script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

<style>
    .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    body {
        font-family: 'Lexend', sans-serif;
        background-color: #fbf9f6;
        min-height: max(884px, 100dvh);
    }
    .nickname-badge {
        display: inline-flex;
        align-items: center;
        background: linear-gradient(135deg, #e8f5e9, #f1f8e9);
        border: 1px solid #a5d6a7;
        border-radius: 9999px;
        padding: 2px 10px;
        font-size: 0.75rem;
        font-weight: 700;
        color: #2e7d32;
        letter-spacing: 0.05em;
        text-transform: lowercase;
    }
</style>
  <link rel="stylesheet" href="/style.css">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
</head>
<body class="text-on-surface">

<!-- Header -->
<header class="bg-[#fbf9f6]/80 dark:bg-stone-900/80 backdrop-blur-xl docked full-width top-0 sticky z-50 shadow-[0_12px_40px_rgba(51,51,51,0.06)]">
    <div class="flex items-center justify-between px-6 py-4">
        <div class="flex items-center gap-4">
            <button onclick="window.history.back()" class="p-2 -ml-2 rounded-full hover:bg-stone-200 transition-colors">
                <span class="material-symbols-outlined">arrow_back</span>
            </button>
            <h1 class="text-xl font-bold tracking-tight">Edit Profile</h1>
        </div>
    </div>
</header>

<main class="py-8 px-6 max-w-2xl mx-auto space-y-8 pb-32">
    <!-- Avatar Edit -->
    <section class="flex flex-col items-center justify-center space-y-4">
        <label for="avatar-upload" class="relative group cursor-pointer block">
            <img id="avatar-preview" alt="Profile Picture" class="w-28 h-28 rounded-full object-cover border-4 border-surface-container-lowest shadow-md group-hover:opacity-75 transition-opacity" src="https://placehold.co/400x400?text=Avatar"/>
            <div class="absolute inset-0 flex items-center justify-center bg-black/30 rounded-full opacity-0 group-hover:opacity-100 transition-opacity">
                <span class="material-symbols-outlined text-white text-3xl" style="font-variation-settings: 'FILL' 1;">photo_camera</span>
            </div>
        </label>
        <input type="file" id="avatar-upload" accept="image/*" class="hidden">
        <label for="avatar-upload" class="text-primary font-bold text-sm cursor-pointer hover:underline">Change Profile Photo</label>
    </section>

    <!-- Form Section -->
    <section class="bg-surface-container-low p-6 rounded-2xl shadow-sm border border-outline-variant/20">
        <form class="space-y-6" id="editProfileForm">
            
            <!-- Full Name -->
            <div class="space-y-2">
                <label for="fullName" class="block text-sm font-semibold text-on-surface-variant">Full Name</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <span class="material-symbols-outlined text-outline">person</span>
                    </div>
                    <input type="text" id="fullName" class="block w-full pl-10 pr-3 py-3 border border-outline-variant rounded-xl bg-surface-container-lowest focus:ring-primary focus:border-primary text-on-surface" placeholder="Your name">
                </div>
            </div>

            <!-- Nickname -->
            <div class="space-y-2">
                <div class="flex items-center justify-between">
                    <label for="nickname" class="block text-sm font-semibold text-on-surface-variant">Nickname / Handle</label>
                    <button type="button" id="generate-initials-btn" class="text-xs text-primary font-bold hover:underline flex items-center gap-1">
                        <span class="material-symbols-outlined text-sm">auto_awesome</span>
                        Generate from name
                    </button>
                </div>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <span class="material-symbols-outlined text-outline">tag</span>
                    </div>
                    <input type="text" id="nickname" maxlength="20" class="block w-full pl-10 pr-16 py-3 border border-outline-variant rounded-xl bg-surface-container-lowest focus:ring-primary focus:border-primary text-on-surface lowercase" placeholder="e.g. bdt" autocomplete="off" autocapitalize="off" spellcheck="false">
                    <div class="absolute inset-y-0 right-3 flex items-center">
                        <span id="nickname-preview" class="nickname-badge hidden"></span>
                    </div>
                </div>
                <p class="text-xs text-outline font-medium">Shown alongside your name in circles. Lowercase letters only. Max 20 chars.</p>
            </div>

            <!-- Location -->
            <div class="space-y-2">
                <label for="location" class="block text-sm font-semibold text-on-surface-variant">Location (Neighborhood)</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <span class="material-symbols-outlined text-outline">location_on</span>
                    </div>
                    <input type="text" id="location" class="block w-full pl-10 pr-3 py-3 border border-outline-variant rounded-xl bg-surface-container-lowest focus:ring-primary focus:border-primary text-on-surface" placeholder="E.g., Northside">
                </div>
            </div>

            <!-- Bio -->
            <div class="space-y-2">
                <label for="bio" class="block text-sm font-semibold text-on-surface-variant">Bio</label>
                <textarea id="bio" rows="4" class="block w-full p-3 border border-outline-variant rounded-xl bg-surface-container-lowest focus:ring-primary focus:border-primary text-on-surface" placeholder="Tell your neighbors a bit about yourself!"></textarea>
                <p class="text-xs text-outline font-medium mt-1">Keep it brief and friendly.</p>
            </div>

            <div id="error-message" class="hidden bg-red-100 text-error p-4 rounded-xl text-sm font-medium mt-4"></div>

        </form>
    </section>
</main>

<!-- Bottom Sticky Action -->
<div class="fixed bottom-0 left-0 w-full p-4 bg-background/95 backdrop-blur-md border-t border-outline-variant/10">
    <button id="saveBtn" class="w-full max-w-2xl mx-auto block bg-gradient-to-br from-primary to-primary-container text-on-primary py-4 rounded-xl font-bold text-center shadow-md active:scale-95 transition-transform">
        Save Changes
    </button>
</div>

<script>
    const avatarUpload = document.getElementById('avatar-upload');
    const avatarPreview = document.getElementById('avatar-preview');
    const nicknameInput = document.getElementById('nickname');
    const nicknamePreview = document.getElementById('nickname-preview');
    let selectedFile = null;

    // Generate initials from a full name (e.g. "B D Tiwari" → "bdt")
    function generateInitials(name) {
        if (!name || !name.trim()) return '';
        return name.trim()
            .split(/\s+/)
            .map(w => w[0])
            .join('')
            .toLowerCase()
            .replace(/[^a-z0-9]/g, '');
    }

    // Live preview of nickname badge
    nicknameInput.addEventListener('input', () => {
        const val = nicknameInput.value.toLowerCase().replace(/[^a-z0-9_]/g, '');
        nicknameInput.value = val;
        if (val) {
            nicknamePreview.textContent = val;
            nicknamePreview.classList.remove('hidden');
        } else {
            nicknamePreview.classList.add('hidden');
        }
    });

    // Generate initials button
    document.getElementById('generate-initials-btn').addEventListener('click', () => {
        const name = document.getElementById('fullName').value;
        const initials = generateInitials(name);
        if (initials) {
            nicknameInput.value = initials;
            nicknamePreview.textContent = initials;
            nicknamePreview.classList.remove('hidden');
        }
    });

    // Image Preview
    avatarUpload.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
            selectedFile = file;
            avatarPreview.src = URL.createObjectURL(file);
        }
    });

    // Hydrate Data on Load
    document.addEventListener('DOMContentLoaded', async () => {
        const session = await requireAuth();
        if (!session) return;
        
        const data = await window.db.getProfile(session.user.uid);

        if (data) {
            if (data.full_name) document.getElementById('fullName').value = data.full_name;
            if (data.location) document.getElementById('location').value = data.location;
            if (data.bio) document.getElementById('bio').value = data.bio;
            if (data.avatar_url) avatarPreview.src = data.avatar_url;

            // Populate nickname — auto-generate initials if none set yet
            const savedNickname = data.nickname || '';
            if (savedNickname) {
                nicknameInput.value = savedNickname;
                nicknamePreview.textContent = savedNickname;
                nicknamePreview.classList.remove('hidden');
            } else if (data.full_name) {
                // Auto-suggest initials (but don't save yet — just pre-fill)
                const initials = generateInitials(data.full_name);
                if (initials) {
                    nicknameInput.value = initials;
                    nicknamePreview.textContent = initials;
                    nicknamePreview.classList.remove('hidden');
                }
            }
        }
    });

    document.getElementById('saveBtn').addEventListener('click', async () => {
        const btn = document.getElementById('saveBtn');
        const errorDiv = document.getElementById('error-message');
        errorDiv.classList.add('hidden');
        
        btn.innerHTML = `<span class="material-symbols-outlined text-[18px] animate-spin align-middle mr-2">progress_activity</span> Saving...`;
        btn.disabled = true;
        btn.classList.add('opacity-70');

        try {
            const session = await requireAuth();
            
            const fullName = document.getElementById('fullName').value.trim();
            const nickname = document.getElementById('nickname').value.trim().toLowerCase();
            const location = document.getElementById('location').value.trim();
            const bio = document.getElementById('bio').value.trim();
            let avatarUrl = undefined;

            if (selectedFile) {
                const fileExt = selectedFile.name.split('.').pop();
                const fileName = `${Math.random()}.${fileExt}`;
                const filePath = `avatars/${session.user.uid}/${fileName}`;
                avatarUrl = await window.db.uploadFile(filePath, selectedFile);
            }

            const updates = {
                full_name: fullName,
                nickname: nickname || generateInitials(fullName),
                location: location,
                bio: bio,
            };
            if (avatarUrl) updates.avatar_url = avatarUrl;

            await window.db.updateProfile(session.user.uid, updates);
            
            window.location.href = 'profile.html';
        } catch (err) {
            console.error(err);
            errorDiv.textContent = err.message || "Failed to update profile.";
            errorDiv.classList.remove('hidden');
            btn.innerHTML = "Save Changes";
            btn.disabled = false;
            btn.classList.remove('opacity-70');
        }
    });
</script>

</body>
</html>

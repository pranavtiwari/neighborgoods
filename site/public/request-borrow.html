<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Share, Instead. - Request to Borrow</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script type="module" src="supabase-client.js"></script>
<script>requireAuth();</script>

<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

<style>
        body { font-family: 'Lexend', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bg-forest-gradient {
            background: linear-gradient(135deg, #0d631b 0%, #2e7d32 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
    <link rel="stylesheet" href="/style.css">
</head>
<body class="bg-surface text-on-surface min-h-screen pb-24">
<!-- TopAppBar -->
<header class="bg-[#fbf9f6]/80 dark:bg-stone-900/80 backdrop-blur-xl docked full-width top-0 sticky z-50 shadow-[0_12px_40px_rgba(51,51,51,0.06)]">
<div class="flex items-center justify-between px-6 h-16 w-full">
<button onclick="window.location.href='item-details.html'" class="text-on-surface hover:bg-surface-container transition-all p-2 rounded-full active:scale-95 duration-200">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
<h1 class="text-[1.125rem] font-bold tracking-tight text-[#333333]">Check Availability</h1>
<div id="owner-avatar-container" class="w-10 h-10 rounded-full overflow-hidden bg-surface-container">
<img id="owner-avatar-mini" alt="Owner Profile" class="w-full h-full object-cover" src="https://placehold.co/100x100?text=U"/>
</div>
</div>
</header>
<main class="pt-24 px-6 max-w-md mx-auto space-y-8">
<!-- Item Summary Card -->
<section id="item-summary-card">
<div class="bg-surface-container-lowest rounded-xl p-4 flex gap-4 shadow-[0_4px_20px_rgba(51,51,51,0.04)] items-center">
<div class="w-20 h-20 rounded-lg overflow-hidden flex-shrink-0">
<img id="item-image" alt="Item" class="w-full h-full object-cover" src="https://placehold.co/200x200?text=Loading..."/>
</div>
<div class="flex flex-col">
<span class="text-label text-[0.65rem] uppercase tracking-[0.05em] text-primary font-bold">Lending Item</span>
<h2 id="item-name" class="text-body-lg font-semibold text-on-surface leading-tight">Loading...</h2>
<p id="item-owner-text" class="text-body-sm text-on-surface-variant text-sm mt-1">Lent by ...</p>
</div>
</div>
</section>
<!-- Date Selection (Custom Minimal Calendar) -->
<section class="space-y-4">
<h3 class="text-headline-md text-lg font-bold text-on-surface">Select Dates</h3>
<div class="bg-surface-container-low rounded-xl p-6">
<div class="flex justify-between items-center mb-6">
<button id="prev-month" class="material-symbols-outlined text-outline hover:bg-surface-container-high rounded-full p-1 transition-colors">chevron_left</button>
<span id="current-month-display" class="font-medium">October 2023</span>
<button id="next-month" class="material-symbols-outlined text-outline hover:bg-surface-container-high rounded-full p-1 transition-colors">chevron_right</button>
</div>
<div class="grid grid-cols-7 gap-2 text-center text-[0.75rem] font-bold text-outline mb-2">
<span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span><span>S</span>
</div>
<div id="calendar-grid" class="grid grid-cols-7 gap-y-1">
    <!-- Days will be injected here -->
</div>
<div class="mt-6 flex justify-between border-t border-outline-variant/15 pt-4">
<div class="flex flex-col">
<span class="text-[0.65rem] uppercase text-outline font-bold">Start</span>
<span id="start-date-text" class="text-sm font-medium">Select a date</span>
</div>
<div class="flex flex-col text-right">
<span class="text-[0.65rem] uppercase text-outline font-bold">End</span>
<span id="end-date-text" class="text-sm font-medium">Select a date</span>
</div>
</div>
</div>
</section>
<!-- Message Field -->
<section class="space-y-4">
<div class="flex flex-col gap-2">
<label class="text-[0.75rem] font-bold uppercase tracking-[0.05em] text-on-surface-variant px-1">Message Marcus (Optional)</label>
<textarea class="w-full bg-surface-container-low border-none rounded-xl p-4 focus:ring-0 focus:border-b-2 focus:border-primary text-body-lg placeholder:text-on-surface-variant/40 transition-all resize-none" placeholder="Hi Marcus, I'd love to use the ladder for some tree trimming this weekend..." rows="4"></textarea>
</div>
</section>
<!-- Agreement -->
<section>
<label class="flex items-start gap-4 cursor-pointer group">
<div class="relative flex items-center mt-1">
<input class="peer h-5 w-5 rounded border-2 border-outline-variant bg-surface text-primary focus:ring-offset-0 focus:ring-0 appearance-none checked:bg-primary checked:border-primary transition-all" type="checkbox"/>
<span class="material-symbols-outlined absolute text-on-primary text-sm opacity-0 peer-checked:opacity-100 left-0.5 pointer-events-none" style="font-variation-settings: 'wght' 700;">check</span>
</div>
<span class="text-sm text-on-surface-variant leading-relaxed">
                    I agree to the <span class="text-primary font-semibold underline decoration-primary/30">Community Safety Guidelines</span>.
                </span>
</label>
</section>
<!-- Main Action & Note -->
<section class="pt-4 space-y-6">
<button id="send-request-btn" class="w-full bg-forest-gradient text-on-primary py-5 rounded-lg font-bold text-lg shadow-[0_12px_40px_rgba(13,99,27,0.15)] active:scale-95 duration-200 transition-all">
                Send Request
            </button>
<div class="bg-secondary-fixed/30 p-4 rounded-xl flex items-center gap-4">
<div class="bg-secondary-container text-on-secondary rounded-full p-2 flex items-center justify-center">
<span class="material-symbols-outlined text-[20px]" data-icon="volunteer_activism" style="font-variation-settings: 'FILL' 1;">volunteer_activism</span>
</div>
<p class="text-xs font-medium text-on-secondary-fixed-variant leading-normal">
                    You won't be charged. <span class="text-secondary font-bold">This is a neighborly share!</span>
</p>
</div>
</section>
</main>
<!-- Bottom Navigation Shell (Suppressed as per task context: Task-Focused screens hide global nav) -->
<!-- The FAB is suppressed as per the "Contextual FAB Suppression" rule for transactional/details pages -->
<script>
    const calendarGrid = document.getElementById('calendar-grid');
    const startDateText = document.getElementById('start-date-text');
    const endDateText = document.getElementById('end-date-text');
    const monthDisplay = document.getElementById('current-month-display');
    const prevBtn = document.getElementById('prev-month');
    const nextBtn = document.getElementById('next-month');

    let currentViewDate = new Date();
    currentViewDate.setDate(1); // Set to first of month for navigation
    let startDate = null;
    let endDate = null;

    function renderCalendar() {
        calendarGrid.innerHTML = '';
        const year = currentViewDate.getFullYear();
        const month = currentViewDate.getMonth();
        
        // Update display text
        const monthName = new Intl.DateTimeFormat('en-US', { month: 'long' }).format(currentViewDate);
        monthDisplay.innerText = `${monthName} ${year}`;

        // Get first day of month (0=Sun, 1=Mon...)
        const firstDay = new Date(year, month, 1).getDay();
        // Adjust for M-T-W-T-F-S-S grid (Monday=0)
        let firstDayOffset = (firstDay + 6) % 7;
        
        const daysInCurrentMonth = new Date(year, month + 1, 0).getDate();
        const daysInPrevMonth = new Date(year, month, 0).getDate();

        // Previous month days (offset)
        for (let i = firstDayOffset - 1; i >= 0; i--) {
            const div = document.createElement('div');
            div.className = 'py-3 text-surface-dim text-center cursor-not-allowed opacity-30';
            div.innerText = daysInPrevMonth - i;
            calendarGrid.appendChild(div);
        }

        // Current month days
        const today = new Date();
        today.setHours(0, 0, 0, 0);

        for (let i = 1; i <= daysInCurrentMonth; i++) {
            const dateObj = new Date(year, month, i);
            const isPast = dateObj < today;
            
            const div = document.createElement('div');
            div.innerText = i;
            div.className = 'py-3 text-on-surface text-center cursor-pointer rounded-lg transition-all relative';
            
            if (isPast) {
                div.classList.add('cursor-not-allowed', 'opacity-30', 'text-surface-dim');
            } else {
                div.classList.add('hover:bg-surface-container-high');
                div.addEventListener('click', () => selectDate(dateObj));
            }

            // Selection styles
            if (startDate && dateObj.getTime() === startDate.getTime()) {
                div.classList.add('bg-primary', 'text-on-primary', 'font-bold', 'z-10');
            } else if (endDate && dateObj.getTime() === endDate.getTime()) {
                div.classList.add('bg-primary', 'text-on-primary', 'font-bold', 'z-10');
            } else if (startDate && endDate && dateObj > startDate && dateObj < endDate) {
                div.classList.add('bg-primary-fixed', 'text-on-primary-fixed-variant', 'rounded-none');
            }

            calendarGrid.appendChild(div);
        }
    }

    function selectDate(dateObj) {
        if (!startDate || (startDate && endDate)) {
            startDate = dateObj;
            endDate = null;
        } else if (dateObj < startDate) {
            startDate = dateObj;
        } else if (dateObj.getTime() === startDate.getTime()) {
            startDate = null;
        } else {
            endDate = dateObj;
        }
        updateTexts();
        renderCalendar();
    }

    function updateTexts() {
        const options = { month: 'short', day: 'numeric', year: 'numeric' };
        startDateText.innerText = startDate ? startDate.toLocaleDateString('en-US', options) : 'Select a date';
        endDateText.innerText = endDate ? endDate.toLocaleDateString('en-US', options) : 'Select a date';
    }

    prevBtn.addEventListener('click', () => {
        currentViewDate.setMonth(currentViewDate.getMonth() - 1);
        renderCalendar();
    });

    nextBtn.addEventListener('click', () => {
        currentViewDate.setMonth(currentViewDate.getMonth() + 1);
        renderCalendar();
    });

    renderCalendar();

    // DYNAMIC DATA LOADING
    const urlParams = new URLSearchParams(window.location.search);
    const itemId = urlParams.get('id');
    let itemOwnerId = null;

    async function loadItem() {
        if (!itemId) return;

        const { data: item, error } = await window.supabaseClient
            .from('items')
            .select('*, profiles!owner_id(*)')
            .eq('id', itemId)
            .single();

        if (error || !item) {
            console.error("Error loading item:", error);
            return;
        }

        itemOwnerId = item.owner_id;
        document.getElementById('item-name').textContent = item.name;
        document.getElementById('item-image').src = item.image_url || 'https://placehold.co/200x200';
        document.getElementById('item-owner-text').textContent = `Lent by ${item.profiles.full_name}`;
        document.getElementById('owner-avatar-mini').src = item.profiles.avatar_url || 'https://i.pravatar.cc/150?u=' + item.profiles.id;
    }

    document.getElementById('send-request-btn').addEventListener('click', async () => {
        const session = await requireAuth();
        if (!session) return;

        if (!startDate || !endDate) {
            alert("Please select both start and end dates.");
            return;
        }

        const message = document.querySelector('textarea').value;
        
        try {
            // 1. Create the request
            const { data: request, error: reqError } = await window.supabaseClient
                .from('requests')
                .insert({
                    item_id: itemId,
                    borrower_id: session.user.id,
                    start_date: startDate.toISOString(),
                    end_date: endDate.toISOString(),
                    status: 'pending'
                })
                .select()
                .single();

            if (reqError) throw reqError;

            // 2. Send an initial message to the owner
            const { error: msgError } = await window.supabaseClient
                .from('messages')
                .insert({
                    sender_id: session.user.id,
                    receiver_id: itemOwnerId,
                    item_id: itemId,
                    content: message || `Hi! I'd like to borrow your ${document.getElementById('item-name').textContent}.`
                });

            if (msgError) throw msgError;

            // 3. Redirect to success page
            window.location.href = 'request-sent.html';

        } catch (err) {
            console.error("Error sending request:", err);
            alert("Failed to send request: " + err.message);
        }
    });

    document.addEventListener('DOMContentLoaded', loadItem);
</script>
</body></html>

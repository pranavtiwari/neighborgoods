<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="config.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script src="firebase-client.js"></script>
    <script>requireAuth();</script>
    
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script>
        if (window.tailwind) {
            tailwind.config = {
                darkMode: "class",
                theme: {
                    extend: {
                        colors: {
                            primary: "#0d631b",
                            "primary-container": "#2e7d32",
                            surface: "#fbf9f6",
                            "on-surface": "#1b1c1a",
                            "on-surface-variant": "#40493d",
                            "surface-container": "#efeeeb",
                            "surface-container-low": "#f5f3f0",
                            "surface-container-lowest": "#ffffff",
                            "outline-variant": "#bfcaba",
                        },
                        fontFamily: {
                            body: ["Lexend"],
                            display: ["Lexend"],
                        }
                    }
                }
            };
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
  <link rel="stylesheet" href="/style.css">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
</head>
<body class="bg-surface font-body text-on-surface antialiased flex flex-col min-h-screen">

    <!-- Top AppBar -->
    <header class="bg-[#fbf9f6]/80 dark:bg-stone-900/80 backdrop-blur-xl docked full-width top-0 sticky z-50 shadow-[0_12px_40px_rgba(51,51,51,0.06)]">
        <div class="flex justify-between items-center w-full px-6 py-4 max-w-7xl mx-auto">
            <div class="flex items-center gap-4">
                <a href="index.html" class="text-2xl font-bold text-primary dark:text-primary-fixed-dim tracking-tighter font-headline flex items-center gap-2">
                    <span class="material-symbols-outlined text-primary dark:text-primary-fixed-dim text-2xl">menu_book</span>
                    <span>Share, Instead.</span>
                </a>
            </div>
            <div class="hidden md:flex gap-8 items-center">
                <a class="text-stone-800 dark:text-stone-200 font-medium hover:bg-[#efeeeb] dark:hover:bg-stone-800 transition-colors duration-300 px-2 py-1 rounded tracking-tight" href="index.html">Home</a>
                <a class="text-stone-800 dark:text-stone-200 font-medium hover:bg-[#efeeeb] dark:hover:bg-stone-800 transition-colors duration-300 px-2 py-1 rounded tracking-tight" href="explore.html">Explore</a>
                <a class="text-stone-800 dark:text-stone-200 font-medium hover:bg-[#efeeeb] dark:hover:bg-stone-800 transition-colors duration-300 px-2 py-1 rounded tracking-tight" href="circles.html">Circles</a>
                <a class="text-primary dark:text-primary-fixed-dim font-semibold border-b-2 border-primary dark:border-primary-fixed-dim pb-1 tracking-tight" href="messages.html">Inbox</a>
                <a class="text-stone-800 dark:text-stone-200 font-medium hover:bg-[#efeeeb] dark:hover:bg-stone-800 transition-colors duration-300 px-2 py-1 rounded tracking-tight" href="activity.html">Activity</a>
            </div>
            <div class="relative">
                <div onclick="document.getElementById('profile-dropdown').classList.toggle('hidden')" class="w-10 h-10 rounded-full bg-surface-container overflow-hidden active:scale-95 transition-transform duration-200 cursor-pointer border-2 border-primary/20">
                    <img id="header-avatar" alt="User avatar" class="w-full h-full object-cover" src="https://i.pravatar.cc/150?u=me"/>
                </div>
                <div id="profile-dropdown" class="hidden absolute right-0 mt-2 w-48 bg-surface rounded-xl shadow-xl border border-outline-variant z-50 py-2">
                    <a href="profile.html" class="flex items-center gap-3 px-4 py-2 hover:bg-surface-container-high transition-colors">
                        <span class="material-symbols-outlined text-[20px]">person</span>
                        <span class="text-sm font-medium">My Profile</span>
                    </a>
                    <button onclick="event.stopPropagation(); firebase.auth().signOut().then(function(){window.location.href='index.html'});" class="w-full flex items-center gap-3 px-4 py-3 min-h-[44px] hover:bg-error-container text-error transition-colors cursor-pointer" style="touch-action: manipulation;">
                        <span class="material-symbols-outlined text-[20px]">logout</span>
                        <span class="text-sm font-bold text-left">Logout</span>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <main class="flex-1 max-w-2xl mx-auto w-full px-4 py-6">
        <!-- Search/Filter Bar -->
        <div class="mb-6">
            <div class="bg-surface-container-low rounded-2xl px-4 py-3 flex gap-3 items-center">
                <span class="material-symbols-outlined text-on-surface-variant/60 text-xl">filter_list</span>
                <input type="text" placeholder="Search conversations..." class="bg-transparent border-none focus:ring-0 w-full text-sm placeholder:text-on-surface-variant/40">
            </div>
        </div>

        <!-- Chat List -->
        <div class="space-y-1" id="inbox-list">
            <div class="text-center text-sm font-medium text-stone-400 mt-10 animate-pulse">Loading secure inbox...</div>
        </div>
    </main>

    <!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-2 pb-6 pt-3 bg-[#fbf9f6]/90 dark:bg-stone-900/90 backdrop-blur-xl z-50 rounded-t-3xl shadow-[0_-8px_30px_rgba(51,51,51,0.06)] md:hidden border-t border-outline-variant/10">
    <a class="flex flex-col items-center justify-center py-1.5 px-3 rounded-xl transition-all duration-200 active:scale-90 text-stone-500 hover:text-primary dark:text-stone-400 dark:hover:text-green-400" href="index.html">
        <span class="material-symbols-outlined mb-0.5">home</span>
        <span class="text-[10px] font-bold uppercase tracking-wider">Home</span>
    </a>
    <a class="flex flex-col items-center justify-center py-1.5 px-3 rounded-xl transition-all duration-200 active:scale-90 text-stone-500 hover:text-primary dark:text-stone-400 dark:hover:text-green-400" href="explore.html">
        <span class="material-symbols-outlined mb-0.5">explore</span>
        <span class="text-[10px] font-bold uppercase tracking-wider">Explore</span>
    </a>
    <a class="flex flex-col items-center justify-center py-1.5 px-3 rounded-xl transition-all duration-200 active:scale-90 text-stone-500 hover:text-primary dark:text-stone-400 dark:hover:text-green-400" href="circles.html">
        <span class="material-symbols-outlined mb-0.5">groups</span>
        <span class="text-[10px] font-bold uppercase tracking-wider">Circles</span>
    </a>
    <a class="flex flex-col items-center justify-center py-1.5 px-3 rounded-xl transition-all duration-200 active:scale-90 text-primary dark:text-green-400 bg-primary/10 dark:bg-green-900/30" href="messages.html">
        <span class="material-symbols-outlined mb-0.5" style="font-variation-settings: 'FILL' 1;">chat_bubble</span>
        <span class="text-[10px] font-bold uppercase tracking-wider">Inbox</span>
    </a>
    <a class="flex flex-col items-center justify-center py-1.5 px-3 rounded-xl transition-all duration-200 active:scale-90 text-stone-500 hover:text-primary dark:text-stone-400 dark:hover:text-green-400" href="activity.html">
        <span class="material-symbols-outlined mb-0.5">notifications</span>
        <span class="text-[10px] font-bold uppercase tracking-wider">Activity</span>
    </a>
</nav>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const session = await requireAuth();
            if (!session) return;
            const currentUser = session.user;

            const inboxList = document.getElementById('inbox-list');

            try {
                // Fetch all messages where currentUser is involved
                const messages = await window.db.getInboxMessages(currentUser.id);

                if (!messages || messages.length === 0) {
                    inboxList.innerHTML = `
                        <div class="text-center font-medium text-stone-400 mt-10">
                            No messages yet.<br>
                            <a href="explore.html" class="text-primary mt-2 inline-block">Go find something to borrow!</a>
                        </div>`;
                    return;
                }

                // Group by conversation partner
                const threads = new Map();
                for (const msg of messages) {
                    const isSender = msg.sender_id === currentUser.id;
                    const partnerId = isSender ? msg.receiver_id : msg.sender_id;
                    const partnerProfile = isSender ? msg.receiver : msg.sender;

                    if (!threads.has(partnerId)) {
                        threads.set(partnerId, {
                            partner: partnerProfile,
                            latestMessage: msg,
                            isUnread: !isSender && !msg.is_read
                        });
                    }
                }

                inboxList.innerHTML = ''; // clear loading state
                
                // Render inbox cards
                for (const [partnerId, thread] of threads.entries()) {
                    const profile = thread.partner;
                    const lastMsg = thread.latestMessage;
                    
                    const timeString = new Date(lastMsg.created_at).toLocaleDateString([], { month: 'short', day: 'numeric' });
                    const snippet = lastMsg.sender_id === currentUser.id ? `You: ${lastMsg.content}` : lastMsg.content;

                    const avatarUrl = profile?.avatar_url || 'https://placehold.co/100x100?text=U';
                    const name = profile?.full_name || 'Unknown User';

                    inboxList.innerHTML += `
                    <a href="chat.html?userId=${partnerId}" class="flex items-center gap-4 p-4 rounded-2xl hover:bg-surface-container-low transition-all active:scale-[0.98] duration-200 group relative ${thread.isUnread ? 'bg-surface-container-lowest shadow-sm' : 'opacity-80'}">
                        <div class="relative">
                            <div class="w-14 h-14 rounded-full overflow-hidden bg-stone-200">
                                <img src="${avatarUrl}" class="w-full h-full object-cover">
                            </div>
                            ${thread.isUnread ? `<div class="absolute -top-1 -right-1 w-4 h-4 rounded-full bg-primary border-2 border-surface"></div>` : ''}
                        </div>
                        <div class="flex-1 min-w-0">
                            <div class="flex justify-between items-baseline mb-0.5">
                                <h2 class="font-bold text-base truncate ${thread.isUnread ? 'text-on-surface' : ''}">${name}</h2>
                                <span class="text-[10px] font-bold text-on-surface-variant/40 uppercase tracking-widest">${timeString}</span>
                            </div>
                            <p class="text-sm text-on-surface-variant truncate ${thread.isUnread ? 'font-bold text-on-surface' : ''}">${snippet}</p>
                        </div>
                    </a>`;
                }

            } catch (err) {
                console.error(err);
                inboxList.innerHTML = `<div class="text-center text-error mt-4">Failed to load inbox</div>`;
            }

            // Update header avatar
            async function updateHeaderAvatar(user) {
                if (user) {
                    const profile = await window.db.getProfile(user.uid);
                    const metaAvatar = user.photoURL;
                    if (profile && profile.avatar_url) {
                        document.getElementById('header-avatar').src = profile.avatar_url;
                    } else if (metaAvatar) {
                        document.getElementById('header-avatar').src = metaAvatar;
                    } else {
                        document.getElementById('header-avatar').src = `https://i.pravatar.cc/150?u=${user.uid}`;
                    }
                }
            }
            updateHeaderAvatar(currentUser);

            // Close dropdown on outside click
            document.addEventListener('pointerdown', (e) => {
                const dropdown = document.getElementById('profile-dropdown');
                if (dropdown && !dropdown.classList.contains('hidden') && !e.target.closest('#profile-dropdown') && !e.target.closest('[onclick*="profile-dropdown"]')) {
                    setTimeout(() => dropdown.classList.add('hidden'), 150);
                }
            });
        });
    </script>
</body>
</html>

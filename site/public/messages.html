<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Share, Instead. - Messages</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="supabase-client.js"></script>
    <script>requireAuth();</script>
    
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#0d631b",
                        "primary-container": "#2e7d32",
                        surface: "#fbf9f6",
                        "on-surface": "#1b1c1a",
                        "on-surface-variant": "#40493d",
                        "surface-container": "#efeeeb",
                        "surface-container-low": "#f5f3f0",
                        "surface-container-lowest": "#ffffff",
                        "outline-variant": "#bfcaba",
                    },
                    fontFamily: {
                        body: ["Lexend"],
                        display: ["Lexend"],
                    }
                }
            }
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
  <link rel="stylesheet" href="/style.css">
</head>
<body class="bg-surface font-body text-on-surface antialiased flex flex-col min-h-screen">

    <!-- Top AppBar -->
    <header class="bg-[#fbf9f6]/95 backdrop-blur-xl border-b border-outline-variant/10 sticky top-0 z-50">
        <div class="flex items-center justify-between px-6 py-4 max-w-2xl mx-auto w-full">
            <h1 class="text-2xl font-black tracking-tight text-green-900">Messages</h1>
            <div class="flex items-center gap-4">
                <button class="p-2 rounded-full hover:bg-stone-200 transition-colors">
                    <span class="material-symbols-outlined">search</span>
                </button>
                <div class="relative">
                    <div onclick="document.getElementById('profile-dropdown').classList.toggle('hidden')" class="w-10 h-10 rounded-full bg-surface-container overflow-hidden active:scale-95 transition-transform duration-200 cursor-pointer border-2 border-primary/20">
                        <img id="header-avatar" alt="User avatar" class="w-full h-full object-cover" src="https://i.pravatar.cc/150?u=me"/>
                    </div>
                    <div id="profile-dropdown" class="hidden absolute right-0 mt-2 w-48 bg-surface rounded-xl shadow-xl border border-outline-variant z-50 py-2">
                        <a href="profile.html" class="flex items-center gap-3 px-4 py-2 hover:bg-surface-container-high transition-colors">
                            <span class="material-symbols-outlined text-[20px]">person</span>
                            <span class="text-sm font-medium">My Profile</span>
                        </a>
                        <button onclick="window.logout()" class="w-full flex items-center gap-3 px-4 py-2 hover:bg-error-container text-error transition-colors">
                            <span class="material-symbols-outlined text-[20px]">logout</span>
                            <span class="text-sm font-bold">Logout</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="flex-1 max-w-2xl mx-auto w-full px-4 py-6">
        <!-- Search/Filter Bar -->
        <div class="mb-6">
            <div class="bg-surface-container-low rounded-2xl px-4 py-3 flex gap-3 items-center">
                <span class="material-symbols-outlined text-on-surface-variant/60 text-xl">filter_list</span>
                <input type="text" placeholder="Search conversations..." class="bg-transparent border-none focus:ring-0 w-full text-sm placeholder:text-on-surface-variant/40">
            </div>
        </div>

        <!-- Chat List -->
        <div class="space-y-1" id="inbox-list">
            <div class="text-center text-sm font-medium text-stone-400 mt-10 animate-pulse">Loading secure inbox...</div>
        </div>
    </main>

    <!-- Bottom Nav -->
    <nav class="bg-surface border-t border-outline-variant/20 pb-safe shrink-0">
        <div class="flex justify-around items-center h-16">
            <a href="explore.html" class="flex flex-col items-center justify-center w-full h-full text-on-surface-variant hover:bg-surface-container-low transition-colors">
                <span class="material-symbols-outlined mb-1 text-xl">explore</span>
                <span class="text-[10px] font-medium tracking-wide">Explore</span>
            </a>
            <a href="circles.html" class="flex flex-col items-center justify-center w-full h-full text-on-surface-variant hover:bg-surface-container-low transition-colors">
                <span class="material-symbols-outlined mb-1 text-xl">group</span>
                <span class="text-[10px] font-medium tracking-wide">Circles</span>
            </a>
            <a href="messages.html" class="flex flex-col items-center justify-center w-full h-full text-primary hover:bg-surface-container-low transition-colors">
                <span class="material-symbols-outlined mb-1 text-xl drop-shadow-sm font-bold" data-icon="mail">mail</span>
                <span class="text-[10px] font-bold tracking-wide">Inbox</span>
            </a>
            <a href="profile.html" class="flex flex-col items-center justify-center w-full h-full text-on-surface-variant hover:bg-surface-container-low transition-colors">
                <span class="material-symbols-outlined mb-1 text-xl" data-icon="person">person</span>
                <span class="text-[10px] font-medium tracking-wide">Profile</span>
            </a>
        </div>
    </nav>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const session = await requireAuth();
            if (!session) return;
            const currentUser = session.user;

            const inboxList = document.getElementById('inbox-list');

            try {
                // Fetch all messages where currentUser is involved
                const { data: messages, error } = await window.supabaseClient
                    .from('messages')
                    .select('*, sender:profiles!sender_id(*), receiver:profiles!receiver_id(*)')
                    .or(`sender_id.eq.${currentUser.id},receiver_id.eq.${currentUser.id}`)
                    .order('created_at', { ascending: false });

                if (error) throw error;

                if (!messages || messages.length === 0) {
                    inboxList.innerHTML = `
                        <div class="text-center font-medium text-stone-400 mt-10">
                            No messages yet.<br>
                            <a href="explore.html" class="text-primary mt-2 inline-block">Go find something to borrow!</a>
                        </div>`;
                    return;
                }

                // Group by conversation partner
                const threads = new Map();
                for (const msg of messages) {
                    const isSender = msg.sender_id === currentUser.id;
                    const partnerId = isSender ? msg.receiver_id : msg.sender_id;
                    const partnerProfile = isSender ? msg.receiver : msg.sender;

                    if (!threads.has(partnerId)) {
                        threads.set(partnerId, {
                            partner: partnerProfile,
                            latestMessage: msg,
                            isUnread: !isSender && !msg.is_read
                        });
                    }
                }

                inboxList.innerHTML = ''; // clear loading state
                
                // Render inbox cards
                for (const [partnerId, thread] of threads.entries()) {
                    const profile = thread.partner;
                    const lastMsg = thread.latestMessage;
                    
                    const timeString = new Date(lastMsg.created_at).toLocaleDateString([], { month: 'short', day: 'numeric' });
                    const snippet = lastMsg.sender_id === currentUser.id ? `You: ${lastMsg.content}` : lastMsg.content;

                    const avatarUrl = profile?.avatar_url || 'https://placehold.co/100x100?text=U';
                    const name = profile?.full_name || 'Unknown User';

                    inboxList.innerHTML += `
                    <a href="chat.html?userId=${partnerId}" class="flex items-center gap-4 p-4 rounded-2xl hover:bg-surface-container-low transition-all active:scale-[0.98] duration-200 group relative ${thread.isUnread ? 'bg-surface-container-lowest shadow-sm' : 'opacity-80'}">
                        <div class="relative">
                            <div class="w-14 h-14 rounded-full overflow-hidden bg-stone-200">
                                <img src="${avatarUrl}" class="w-full h-full object-cover">
                            </div>
                            ${thread.isUnread ? `<div class="absolute -top-1 -right-1 w-4 h-4 rounded-full bg-primary border-2 border-surface"></div>` : ''}
                        </div>
                        <div class="flex-1 min-w-0">
                            <div class="flex justify-between items-baseline mb-0.5">
                                <h2 class="font-bold text-base truncate ${thread.isUnread ? 'text-on-surface' : ''}">${name}</h2>
                                <span class="text-[10px] font-bold text-on-surface-variant/40 uppercase tracking-widest">${timeString}</span>
                            </div>
                            <p class="text-sm text-on-surface-variant truncate ${thread.isUnread ? 'font-bold text-on-surface' : ''}">${snippet}</p>
                        </div>
                    </a>`;
                }

            } catch (err) {
                console.error(err);
                inboxList.innerHTML = `<div class="text-center text-error mt-4">Failed to load inbox</div>`;
            }

            // Update header avatar
            async function updateHeaderAvatar() {
                const { data: { user } } = await window.supabaseClient.auth.getUser();
                if (user) {
                    const { data: profile } = await window.supabaseClient
                        .from('profiles')
                        .select('avatar_url')
                        .eq('id', user.id)
                        .single();
                    
                    const metaAvatar = user.user_metadata?.avatar_url || user.user_metadata?.picture;
                    if (profile && profile.avatar_url) {
                        document.getElementById('header-avatar').src = profile.avatar_url;
                    } else if (metaAvatar) {
                        document.getElementById('header-avatar').src = metaAvatar;
                    } else {
                        document.getElementById('header-avatar').src = `https://i.pravatar.cc/150?u=${user.id}`;
                    }
                }
            }
            updateHeaderAvatar();

            // Close dropdown on outside click
            window.addEventListener('click', (e) => {
                const dropdown = document.getElementById('profile-dropdown');
                if (dropdown && !e.target.closest('#profile-dropdown') && !e.target.closest('[onclick*="profile-dropdown"]')) {
                    dropdown.classList.add('hidden');
                }
            });
        });
    </script>
</body>
</html>
